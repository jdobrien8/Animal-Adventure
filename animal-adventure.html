 kangaroo rat family has been using for three weeks. The flat rock to his right absorbed the afternoon sun and is still radiating warmth at ten in the evening. The creosote scrub screens him on three sides. He is not particularly hidden — the diamond pattern on his back does not match the substrate perfectly — but he doesn't need to be hidden. He needs to be still, and still is what he does better than almost anything on Earth.\n\nHis pit organs are reading the world in thermal infrared — those twin depressions between his eyes and his nostrils, each one containing a membrane sensitive to temperature differences of a thousandth of a degree. He sees the heat signatures of the kangaroo rat trail without using his eyes at all. He could strike accurately in absolute darkness. He could strike accurately if he were blind.\n\nBefore settling into his ambush position this evening, he checked the area around the trail. A roadrunner worked this section of desert in the afternoon — that long-legged bird that hunts rattlesnakes by feinting, striking behind the head, and battering them against rocks. He found no current sign of it. A kingsnake moved through yesterday — he can read the scent track, and kingsnakes are immune to his venom and will attack him if they find him. Yesterday's track is cold enough to dismiss. A coyote uses the wash bed below, but coyotes give adult rattlesnakes reasonable clearance.\n\n§N2§ is in her own ambush position further along the wash. He can sense the faint thermal signature of her coiled body from twenty metres.\n\nThe kangaroo rat appears on the trail.\n\nIt is moving quickly and confidently — this trail has been safe for weeks and the rat's guard is appropriately low. §N1§ strikes in under half a second, the full extension of his body from the coiled position, jaws opening one hundred and eighty degrees, the two hollow fangs rotating forward from their resting position against the palate and driving venom into the rat in a motion too fast for any unaided eye to track. He releases immediately, pulling back into his coil before the rat's reflexes could produce a retaliatory bite.\n\nThe kangaroo rat runs six metres and stops.\n\nHe does not chase it. He follows the scent trail slowly — that chemical change in an envenomated animal, distinct and easy to track — walking at the unhurried pace of something that already knows the outcome. He finds it at six metres. He investigates the surroundings for threats, reads the immediate area, and begins swallowing. Head first. His lower jaw separates at the centre, each half moving independently, ratcheting the rat backward with alternating movements while the elastic ligaments of his skull stretch to accommodate something substantially wider than his own head. It takes seven minutes.\n\nThe kingsnake appears from the creosote scrub while he is still digesting.\n\n§N1§ raises his rattle immediately — that dry, urgent buzzing produced by the hollow keratin rings at his tail tip, each ring a shed skin segment that adds one per moult. The sound fills the immediate area and carries twenty metres. Then he flattens his body, pressing himself wider against the rock, making himself appear larger. The kingsnake is immune to his venom but he is larger than this particular kingsnake and the rattle is a clear statement about the energy cost of the encounter. The kingsnake approaches to three metres, reads the rattle's pitch and the body's size, and continues along the wash bed looking for something more manageable.\n\n§N1§ lowers his rattle and waits for the digestion to complete.\n\nAlong the way they see:\n* The kingsnake moving away down the wash bed\n* A great horned owl perched on the tallest saguaro within sight\n* Kangaroo rats bouncing along their trails with their characteristic leaping gait\n* A coyote moving through the wash below, large and unconcerned\n* A roadrunner in the distance, near the far edge of the creosote flat, not approaching\n\nThe desert night is cool and the digestion is slow and nothing else disturbs the trail.\n\nHe struck in under half a second from a coil he had been holding for four hours without moving.\nHe rattled at a kingsnake immune to his venom and the kingsnake did the size calculation and left.\nHe built his ambush like architecture — the rock, the scrub, the trail — and waited for the world to come to him.\n\n✅ Food eaten: Kangaroo rat\n⚠️ Predator avoided: Kingsnake (rattle plus body-flattening — size assessment went his way)\n👀 Animals seen: Great horned owl, Kangaroo rats, Coyote, Roadrunner (distant), Kingsnake\n\nGoodnight, western diamondbacks. 🌙", "pteranodon": "§N1§ launches from the chalk cliff and the Western Interior Seaway opens beneath him.\n\nHe does not flap immediately. He leans forward into the wind coming off the water, spreads his seven-metre wings — those membranes of skin and muscle stretching from his elongated fourth finger to his body, thin as paper but strong as leather — and catches the updraft rising against the cliff face. He is airborne with a single step, rising without effort, the seaway spreading below him in every direction.\n\nPteranodon weighs twenty-three kilograms. For a wingspan of seven metres, this is extraordinary — lighter than a large dog, lighter than most of the fish he will eat today. The engineering that makes this possible is everywhere in his skeleton: hollow bones with walls thinner than a playing card, air sacs throughout the body cavity, every gram of mass accounted for and justified. He is built to be in the air.\n\nThe crest that extends behind his skull — longer than his beak, angled backward — is not purely display. In flight, it functions as a rudder, tilting slightly to assist turns, reducing the muscular effort needed to change direction in the strong sea winds. He uses it now, banking over the open water, reading the surface below for the signs of fish.\n\nBefore ranging far from the cliff, he reads the sky and the water. A mosasaur has been cruising the surface section near the cliff base — he can read the disturbance in the water, that slow V-wake of something large just below the surface. Mosasaurs occasionally take pterosaurs from the water surface when the bird is focused on a fish and not watching below. He routes out over the open water, away from the cliff base where the mosasaur is hunting.\n\n§N2§ is already over the open sea, working the fish schools visible as dark shapes below the surface.\n\n§N1§ makes his first pass — that low, fast flight along the surface, the long, toothless beak angled down, reading the surface tension for the subtle disturbance of fish moving just below. He sees the school on the third pass: a dense group of Cimolichthys, each one half a metre long, the school turning together in the upper metre of water.\n\nHe lands on the surface — a controlled splash, those feet briefly touching the water — and drives the beak below. It comes up with a fish crossways, which he adjusts with a practiced toss and swallows headfirst while still on the water. He is back in the air in three wingbeats, the takeoff requiring a pole-vault motion from his folded wings — those enormous forelimbs pushing off the water surface as the wings spread.\n\nHe makes eleven more passes through the morning.\n\nA large shark passes close to the surface directly below him on the seventh pass.\n\n§N1§ climbs immediately, gaining altitude above the shark's reach, and circles the area until the shark's dorsal fin moves north toward deeper water. Sharks occasionally breach — he has seen it, and the reach from a breach is significant. He gives the area wide clearance and works the school's southern edge instead.\n\n§N2§ has moved to the calm water behind a low sandbar where the fish concentrate in the shelter.\n\nAlong the way they see:\n* The mosasaur cruising the cliff-base shallows, that massive body just below the surface\n* Hesperornithines — those toothed diving birds — working the same fish schools from below\n* An Elasmosaurus, that long-necked plesiosaur, moving slowly through the deeper water\n* Sea turtles at the surface, their shells catching the afternoon light\n* Other pteranodons working the thermals above the chalk cliffs\n\nThe Western Interior Seaway is warm and wide and full of fish and the thermals above it carry him for hours without effort.\n\nHe launched from a cliff into an updraft and was flying before he finished the step.\nHe pole-vaulted back into the air from the water surface using his folded wings as levers.\nHe weighs twenty-three kilograms and has a seven-metre wingspan and the engineering is perfect.\n\n✅ Food eaten: Cimolichthys fish, Squid\n⚠️ Predator avoided: Large shark (climbed above breach range — gave the area wide clearance)\n👀 Animals seen: Mosasaur, Hesperornithines, Elasmosaurus, Sea turtles, Other pteranodons\n\nGoodnight, pteranodons. 🌙", "quetzalcoatlus": "§N1§ stands five and a half metres tall and he is looking for something to eat.\n\nStanding on the ground, Quetzalcoatlus is the size of a giraffe. The wingspan, when he opens it, is eleven metres — the largest of any flying animal that has ever existed, before or since. He walks on all four limbs, the wing-finger knuckles folded back, those enormous wings compressed along his sides. His neck is three metres long. His beak is two metres long. He moves through the late Cretaceous landscape with the slow, deliberate authority of something that has nothing to fear on the ground except the very largest predators, and not many of those.\n\nHe can fly at one hundred and thirty kilometres per hour. He can stay airborne for days.\n\nThe late Cretaceous inland floodplains of what is now Texas are warm and open, crossed by river systems, dotted with conifer stands and the spreading flowering plants of the newest Cretaceous flora. Quetzalcoatlus hunts this landscape the way a modern stork hunts a wetland — walking through shallow water and open ground, that long beak probing and striking, taking whatever is available: small dinosaurs, lizards, mammals, hatchlings, carrion. He is an opportunist at a scale no modern bird approaches.\n\nBefore ranging far from the river stand, he reads the ground. T. rex scent is present — that predator moves through this landscape and Quetzalcoatlus on the ground, despite its size, is potentially vulnerable if caught in open ground by a predator that outweighs it by six tonnes. He reads the scent's direction and age: three hours old, moving northeast. He moves southwest, toward the river bend where the shallow water concentrates prey.\n\n§N2§ is already at the river, that enormous form unmistakeable against the water, the long beak working the shallows.\n\n§N1§ wades in. The water is warm and clear and the bottom is full of small life — lizards that fled into the water from the bank, small mammals at the water's edge, the occasional fish. He strikes three times in quick succession, that long beak snapping shut with precision, and takes a small lizard, a mammal, and a fish in under a minute. The beak adjusts each catch automatically, rotating the prey to the right orientation for swallowing.\n\nA small theropod on the far bank — one of the fleet-footed ornithomimosaurs — watches him with the nervous attention of something that is usually the predator and is recalculating.\n\n§N1§ reads the T. rex scent again, closer now, from the northeast and moving toward him.\n\nHe walks to open ground, spreads his wings, and launches.\n\nThe takeoff of a large pterosaur is not a running start — it is a single explosive vault, all four limbs pushing simultaneously, those enormous wings catching the air in one motion. He is at twenty metres altitude in three wingbeats and at a hundred metres in ten, the floodplain spreading below him, the T. rex emerging from the conifer stand at the river bend below.\n\nThe T. rex looks up. He is already beyond reach.\n\n§N1§ catches the thermal above the river bend and circles upward without effort, reading the landscape below — the T. rex at the river, the herds moving across the plain, the river channels showing the fish concentrations, the open sections where the small prey are visible from altitude. He banks south on a long glide that will carry him thirty kilometres without a wingbeat.\n\nAlong the way they see:\n* The T. rex at the river bend below, already shrinking to a small shape\n* Triceratops herds moving across the open plain to the west\n* Edmontosaurus in the river shallows, grazing the bank vegetation\n* Ankylosaurs moving slowly through the conifer understory below\n* Other Quetzalcoatlus riding the same thermals at different altitudes\n\nThe late Cretaceous sky belongs to him and he rides it south on the warm air.\n\nHe launched from standing with a single four-limb vault and was at a hundred metres in ten wingbeats.\nHe is the largest flying animal that has ever lived and he walks on the ground like a giraffe and flies like a jet.\nThe T. rex looked up and he was already too far away to matter.\n\n✅ Food eaten: Small lizard, Small mammal, Fish, Hatchling dinosaur\n⚠️ Predator avoided: T. rex (launched before it reached the river — out of reach in three wingbeats)\n👀 Animals seen: T. rex, Triceratops herds, Edmontosaurus, Ankylosaurs, Other Quetzalcoatlus\n\nGoodnight, Quetzalcoatlus. 🌙", "aerodactylus": "§N1§ is fifty centimetres across and he owns the air above the lagoon.\n\nNot in contest — in practice. He is small enough that the large pterosaurs working the open water ignore him, and fast enough that the predators on the ground cannot catch him. He has been flying this lagoon since he emerged from his egg on the limestone shelf three years ago and he knows every current, every fish concentration, every shadow that means something is below the surface looking up.\n\nAerodactylus is one of the earliest pterosaurs ever found — his fossils will be discovered in the Solnhofen limestone of Bavaria, preserved in extraordinary detail in the fine sediment of this very lagoon, one hundred and fifty million years from now. Tonight he is alive and hunting and entirely unaware of his future fame.\n\nBefore ranging out over the deep water, he reads the surface from the cliff edge. A large Leedsichthys — that enormous filter feeder — is moving a slow circuit through the deeper section, its wake visible from above. Where it passes, small fish scatter to the surface margins. He files this and plans his route accordingly: follow the Leedsichthys circuit at a distance, work the fish it displaces upward.\n\n§N2§ is already in the air above the lagoon's northern section, that small silhouette moving in quick, precise passes along the surface.\n\n§N1§ launches from the cliff and catches the sea wind immediately. His wings are narrow and pointed — built for speed and manoeuvrability rather than the long soaring efficiency of the larger pterosaurs — and he cuts through the air above the lagoon with quick, shallow wingbeats, reading the surface below with sharp eyes that register movement in the top centimetre of water.\n\nHe makes his first strike on the second pass — a low, fast approach, the beak entering the water at a shallow angle, those few front teeth closing on a small fish before it has registered the shadow above. He tosses it, adjusts, swallows headfirst on the wing, and banks back around before the ripple from the strike has finished spreading.\n\nSix more strikes through the morning. He misses two and connects on four.\n\nThe Leedsichthys makes its pass through the centre of the lagoon and the fish scatter exactly as predicted. §N1§ drops to surface level and works the left margin where the displaced fish are thickest, taking three in quick succession, the strikes so fast that the fish school barely registers the losses before closing the gap.\n\nA Rhamphorhynchus — larger, longer-tailed, a different hunting style — crosses into his section of the lagoon.\n\n§N1§ climbs immediately, gaining altitude above the larger pterosaur's flight level, and circles. Rhamphorhynchus and Aerodactylus share this lagoon but not in the same airspace — the larger animal's wing turbulence at close range makes low-level hunting difficult for the smaller one. He circles at altitude, watching the Rhamphorhynchus work the section, waiting for it to move on toward the open water. It takes twelve minutes.\n\nHe descends and resumes.\n\nAlong the way they see:\n* The Rhamphorhynchus working the open water section in long, efficient passes\n* The Leedsichthys making its slow circuit through the lagoon's deep channel\n* Small theropod dinosaurs on the limestone shore, watching the water\n* Ammonites drifting in slow spirals in the clear lagoon water below\n* Archaeopteryx working the shoreline vegetation, that feathered bridge between worlds\n\nThe Jurassic lagoon is warm and bright and the fish are rising to the surface all morning.\n\nHe followed a filter-feeder's circuit and used its wake to scatter fish into range.\nHe waited twelve minutes at altitude for the larger pterosaur to clear his section.\nHe is fifty centimetres across and he has been doing this perfectly for three years.\n\n✅ Food eaten: Small fish, Insects, Small crustaceans\n⚠️ Competitor avoided: Rhamphorhynchus (climbed above its flight level — waited it out)\n👀 Animals seen: Rhamphorhynchus, Leedsichthys, Small theropods, Ammonites, Archaeopteryx\n\nGoodnight, Aerodactylus. 🌙", "dimorphodon": "§N1§ clings to the cliff face with his wing claws and reads the sea below.\n\nHe is not in the air yet. He is sixty metres up a chalk cliff on the Early Jurassic coast of what will become England, gripping the rock with the three clawed fingers on each wing and both feet, pressed flat against the limestone in a posture that would be impossible for any later pterosaur. Dimorphodon is an early experiment — one hundred and ninety million years old, built before the pterosaur body plan fully committed to the air, still carrying the ability to climb and cling and walk on all fours that later, more aerial species would lose entirely.\n\nHis skull is enormous relative to his body — that deep, puffin-like beak, brightly coloured according to the fossil evidence of soft tissue impressions, packed with two types of teeth. The large front teeth are for seizing fish. The small back teeth are for processing them. His name means two-form tooth and the teeth are exactly that: a tool kit, not a single instrument.\n\nBefore launching from the cliff he reads the sea surface below. A large fish — one of the predatory ray-finned fish that haunt the Early Jurassic shallows — has been circling the area directly below the cliff base. From above, it is a dark shape moving in slow arcs. From below, when he is on the surface taking a fish, it would be a threat. He watches it for three minutes until it moves south toward the deeper water.\n\n§N2§ launches from a ledge thirty metres to his right and catches the cliff updraft, circling upward without effort.\n\n§N1§ launches — that single push from all four limbs simultaneously, wings spreading, the cliff face dropping away below him. He catches the updraft and rises with it, reading the sea surface from altitude.\n\nThe fishing technique is different from later pterosaurs. He does not make the long, low surface passes of Pteranodon or Rhamphorhynchus. He drops — a controlled dive from altitude, that big beak aimed at the surface, striking down into the water rather than skimming along it. The large front teeth close on the fish from above, the impact absorbed by that thick, heavily built skull. He is back in the air before the splash has settled, the fish crossways in his beak, tossed and swallowed headfirst on the climb back to altitude.\n\nHe makes four successful strikes through the morning.\n\nBetween strikes he returns to the cliff face — climbing back up the rock with those wing claws, resting on a ledge, reading the sea below before the next launch. He is more comfortable on the cliff than in sustained flight, more comfortable climbing than gliding. He is an early pterosaur and the cliff is still home in a way it will not be for his descendants.\n\nA small theropod dinosaur reaches the cliff base and looks up at him.\n\n§N1§ watches it from sixty metres with mild interest. It cannot climb this cliff. It cannot reach him here. He turns his enormous beak toward the sea and resumes reading the surface.\n\nAlong the way they see:\n* The large predatory fish returning to the cliff-base shallows as the afternoon warms\n* Early marine crocodilians in the shallows below, those long-snouted hunters\n* Small early mammals at the cliff top, emerging cautiously in the evening\n* Other Dimorphodon on neighbouring ledges, watching the same sea\n* Ichthyosaurs in the deeper water, those dolphin-shaped marine reptiles\n\nThe Early Jurassic coast is wild and new and the cliff is exactly the right height.\n\nHe climbed a chalk cliff with his wing claws and read the sea from sixty metres before deciding to launch.\nHe dives into the water beak-first from altitude and that thick skull was built for exactly that.\nHe is one hundred and ninety million years old and still working out the details of flight, and he is very good at it.\n\n✅ Food eaten: Fish, Large crustaceans, Insects\n⚠️ Predator avoided: Large predatory fish (watched it move south before launching)\n👀 Animals seen: Large predatory fish, Marine crocodilians, Early mammals, Other Dimorphodon, Ichthyosaurs\n\nGoodnight, Dimorphodon. 🌙", "rhamphorhynchus": "§N1§ has a diamond at the end of his tail and it is not decoration.\n\nThe tail fin — a stiff, diamond-shaped membrane at the tip of his long bony tail — functions as a rudder and a stabiliser, giving him a flight precision that the short-tailed pterosaurs lack. When he banks over the Solnhofen lagoon, the tail fin adjusts automatically, holding the angle of his turn with a steadiness that allows him to read the water below without the constant micro-corrections that shorter-tailed fliers must make. He is one of the most stable fliers in the Jurassic sky and the tail is half the reason.\n\nHe is not the largest pterosaur at this lagoon. Aerodactylus is smaller and faster. The larger pterosaurs of later periods haven't evolved yet. Rhamphorhynchus occupies the middle size — a wingspan of nearly two metres, those long, forward-pointing teeth designed for a specific purpose, that diamond tail fin making him unlike anything else in this sky.\n\nBefore ranging out over the open lagoon he reads the air and water from his launch perch on the limestone outcrop. The large filter-feeder Leedsichthys is making its morning circuit through the deep section — visible from above as an enormous slow shape, its wake pushing small fish toward the lagoon margins. He plans his route along the northern margin where the displaced fish will be thickest.\n\n§N2§ is already airborne, working the eastern section in long, low passes.\n\n§N1§ launches and catches the thermal above the warm limestone immediately. He circles once to gain altitude then descends on a long glide toward the northern margin, wings set, tail fin trimming the glide angle, reading the water surface below.\n\nThe fishing technique is precise and practiced. He flies low and fast along the surface, those forward-pointing teeth — long, slightly curved, interlocking when the mouth is closed like the tines of a fork — angled down toward the water. When a fish is in range, the beak drives below the surface at a shallow angle, the teeth closing, the fish seized. A Rhamphorhynchus fossil was found with a fish still in its throat — swallowed headfirst mid-flight, the fish bones still articulated, the evidence of exactly this technique preserved in limestone for a hundred and fifty million years.\n\nHe takes three fish in the first hour. A fourth on the second pass along the northern margin.\n\nThe Aspidorhynchus appears below him on the fifth pass.\n\nThis long-snouted predatory fish has been following the fish school that §N1§ has been working, and as he makes his strike it surfaces — that long rostrum breaking the water at the same moment the beak goes in. The Aspidorhynchus has been documented in the fossil record grabbing Rhamphorhynchus from the surface — one fossil shows the fish with a pterosaur wing membrane caught in its teeth, both animals preserved together. §N1§ pulls up before the beak reaches the water and climbs fast, clearing the surface by two metres as the Aspidorhynchus passes below.\n\nHe circles wide and approaches the school from the upwind side where the fish are not yet spooked.\n\n§N2§ has moved to the sheltered water behind the sandbar where the fishing is calmer.\n\nAlong the way they see:\n* The Aspidorhynchus continuing its circuit below the fish school\n* Aerodactylus working the lagoon's far section in quick, precise strikes\n* Archaeopteryx on the shoreline, that feathered transitional creature\n* Ammonites in slow spirals through the clear water below\n* Pterodactylus on the limestone outcrop, preening in the afternoon warmth\n\nThe Solnhofen lagoon is ancient and still and full of fish and the diamond tail fin holds every turn exactly right.\n\nHe pulled up two metres before the Aspidorhynchus surfaced — read it coming before it broke the water.\nHis tail fin held the fishing passes so steady he could read the surface without correcting his angle.\nA fossil of him will be found with a fish still in his throat, which is the best possible evidence for a good technique.\n\n✅ Food eaten: Four lagoon fish, Squid\n⚠️ Predator avoided: Aspidorhynchus (pulled up before beak hit water — fish surfaced beneath)\n👀 Animals seen: Aspidorhynchus, Aerodactylus, Archaeopteryx, Ammonites, Pterodactylus\n\nGoodnight, Rhamphorhynchus. 🌙", "dorygnathus": "§N1§ has the most effective fish trap in the Early Jurassic sky and it is built into his jaw.\n\nThe front teeth are long, forward-pointing, and slightly curved — they project outward from the jaw like the tines of a spear, and when the mouth closes they interlock with the upper teeth to form a cage from which a slippery fish has almost no escape. His name means spear jaw. The name is accurate. Every fish that enters the zone of those front teeth is already caught — the curved tips prevent the kind of sideways slip that costs other fish-hunters their meal at the last moment.\n\nHe is a hundred and eighty million years old, hunting the shallow warm seas of the Early Jurassic in the region that will become Germany. The ichthyosaurs move through the deeper water below him. The first crocodilians work the shallows at the coast. The ammonites drift in their spiral shells through the mid-water. Dorygnathus reads all of it from the air and takes what the air gives him access to.\n\nBefore moving out over the open water, he reads the surface from the coastal rock. A large ichthyosaur has been working the area below the point — that dolphin-shaped marine reptile, those enormous eyes reading the water from below, occasionally surfacing to breathe. Ichthyosaurs do not hunt pterosaurs but their presence drives fish deep and reduces surface availability. He moves north, toward the calmer bay where the fish school without the pressure of something large below them.\n\n§N2§ is in the bay already, making her passes along the shallows where the water is clearest.\n\n§N1§ launches from the coastal rock and catches the sea wind off the water — that reliable offshore breeze that the Early Jurassic coast generates each morning as the land heats faster than the sea. He does not need to flap for the first two hundred metres, riding the pressure difference, wings set, those forward-pointing teeth visible against the bright sky as he reads the water below.\n\nHe sees the fish school from thirty metres up — a dense oval shape just below the surface, the individual fish visible in the clear shallow water, moving in the coordinated turns that schools use to confuse predators. He descends on a shallow angle, not a steep dive, approaching from upwind so the fish cannot read his pressure wave in time.\n\nThe spear jaw enters the water.\n\nTwo fish. Both at once — one in the lower jaw's projection, one caught against the upper teeth as the jaw closes. He tosses the first, adjusts, swallows headfirst, then repeats with the second before he has completed his climbing turn. The school closes the gap immediately and he circles for the next pass.\n\nA larger pterosaur — one of the early rhamphorhynchids beginning to establish territory over this bay — crosses into his section.\n\n§N1§ turns and holds his line — that posture that means: I was here first, this pass is mine. The larger pterosaur reads his trajectory and adjusts its own course by ten degrees, giving him the water directly below. He completes his pass, takes another fish, and climbs back to altitude.\n\nAlong the way they see:\n* The ichthyosaur surfacing to breathe near the point before diving again\n* Early crocodilians working the shallow coastal margins below\n* Marine invertebrates visible through the clear shallow water — ammonites, belemnites\n* Other Dorygnathus working the bay's far sections\n* A small early mammal watching from the coastal rocks, keeping well back\n\nThe Early Jurassic sea is clear and warm and the spear jaw has never once let a fish go.\n\nHe caught two fish simultaneously on a single pass with those interlocking front teeth.\nHe held his line when the larger pterosaur crossed into his section and it adjusted course for him.\nHis jaw is a spear and a cage at the same time and the design is one hundred and eighty million years of correct.\n\n✅ Food eaten: Multiple fish, Squid, Small crustaceans\n⚠️ Competitor managed: Larger pterosaur (held flight line — it gave way)\n👀 Animals seen: Ichthyosaur, Early crocodilians, Ammonites and belemnites, Other Dorygnathus, Early mammal\n\nGoodnight, Dorygnathus. 🌙", "tropeognathus": "§N1§ skims the surface of the Early Cretaceous sea and the keel crests on his jaw cut the water like a rudder.\n\nThat is what they are for. The bony crest on his upper jaw and the matching one on his lower jaw project forward, and when his beak enters the water during a surface skim they act as stabilisers — holding the beak steady against the sideways force of the water, preventing the kind of violent yaw that would snap a thinner jaw at the speeds he flies. He is eight and a half metres across and moving fast and the crests make the technique possible at this scale.\n\nTropeognathus is one of the largest pterosaurs that has ever flown. Not the largest — Quetzalcoatlus will claim that record sixty million years later — but among the giants of the Early Cretaceous sky over what will become South America. A hundred and ten million years ago this coastline is warm and open, the sea shallow in places and deep in others, rich with the large fish that a large pterosaur needs to sustain itself.\n\nBefore ranging far from the coastal thermal, he reads the sea. A large shark has been working the surface section to the north — he can see the fin. Sharks have been documented taking pterosaurs from the water surface in the fossil record, and at the scale §N1§ operates — low, fast, beak in the water — the danger is real. He routes south, toward the open water where the fish schools are thickest and the shark fin is not visible.\n\n§N2§ is already out over the open sea, that enormous wingspan visible from a kilometre away, banking in a long arc over a fish concentration below.\n\n§N1§ descends to surface level and begins his pass.\n\nThe technique at this size is different from smaller pterosaurs. He does not make the quick, precise strikes of Aerodactylus or the shallow dips of Rhamphorhynchus. He skims — that long, sustained low pass with the lower jaw cutting the water surface, the keel crests holding the beak angle steady, scooping fish from the upper layer in continuous contact rather than discrete strikes. The fish school below the surface does not have time to respond to something moving this fast at this scale. He lifts his head after thirty metres of surface contact and there are three large fish in those jaws.\n\nHe swallows them in sequence, circling back to altitude on the thermal above the fish concentration.\n\nA mosasaur surfaces directly below him on the second pass — that enormous marine lizard, those jaws opening, the timing suggesting it has been tracking his passes from below and calculated the interception point.\n\n§N1§ pulls up hard before the beak reaches the water, those eight and a half metres of wingspan generating enormous lift in the pull, climbing fast above the mosasaur's reach. He circles the area at altitude, watching the mosasaur's position below, until it submerges and the surface shows no disturbance for two full minutes.\n\nThen he descends and finds the fish school again.\n\nAlong the way they see:\n* The mosasaur cruising below the surface, that dark shape visible from altitude\n* Large shark fins working the northern section of sea\n* Sea turtles at the surface, those round shells catching the afternoon light\n* A Spinosaurus wading in the coastal shallows to the east, fishing in its own way\n* Other large pterosaurs working the thermals above the coastal cliffs\n\nThe Early Cretaceous sea is vast and warm and the fish are thick below the surface.\n\nHe skimmed thirty metres of open water with his jaw and the keel crests held the angle exactly right.\nHe pulled up hard before the mosasaur's jaws arrived and was out of range before it surfaced fully.\nHe is eight and a half metres across and the sea was built for something this size.\n\n✅ Food eaten: Three large fish per pass, Squid\n⚠️ Predator avoided: Mosasaur (pulled up hard before beak hit water — mosasaur surfaced below empty air)\n👀 Animals seen: Mosasaur, Large sharks, Sea turtles, Spinosaurus, Other large pterosaurs\n\nGoodnight, Tropeognathus. 🌙", "nemicolopterus": "§N1§ grips the branch with curved claws built for exactly this and reads the Early Cretaceous forest from the inside.\n\nHe is twenty-five centimetres across. His wingspan is smaller than a modern robin's. He is the smallest pterosaur that has ever been found, and he lives not over the open sea or the coastal lagoon but here — in the forest canopy, among the branches, in the world that most pterosaurs never entered. His curved claws grip the branch the way a modern songbird grips a perch, those feet designed for arboreal life rather than the ground-walking of his larger relatives.\n\nHe has no teeth. Just a small, pointed beak, toothless, designed for the prey available in a forest canopy: insects, spiders, the soft-bodied invertebrates that live in the bark and the leaf litter and the spaces between things. His name means forest flier without teeth and both parts are accurate.\n\nThe Early Cretaceous forest of what will become China is dense and layered — conifers in the upper canopy, ferns and cycads in the understory, the first flowering plants beginning to appear at the forest margins. It is a world in transition. The insects here are enormous by later standards — dragonflies with wingspans of thirty centimetres, beetles the size of a modern mouse. For a twenty-five centimetre pterosaur, a large beetle is a substantial meal.\n\nBefore moving from his roost branch, he reads the canopy around him. A small theropod is working the mid-canopy two trees away — one of the small feathered hunters that occupies this forest, fast and agile, capable of taking a small pterosaur if it gets close enough. He watches its movement for a full minute, tracking its direction and pace, before deciding it is moving away from his section.\n\n§N2§ is on the branch above him, already hunting — that tiny form moving along the bark, that pointed beak probing the crevices where insects shelter.\n\n§N1§ launches from his branch — not the soaring launch of the large pterosaurs, but a quick, fluttering burst of wings, more like a large insect than a traditional pterosaur flight. He crosses to the adjacent branch, lands, grips with those curved claws immediately, and begins reading the bark.\n\nA large beetle is in the gap between the bark and the wood beneath.\n\nHe probes with his beak — that pointed tip reaching into the gap, feeling for the beetle, angling carefully — and pulls it free. No teeth needed: he positions it with two adjustments and swallows it whole. A spider from the underside of the next branch. Three small insects from the leaf surface. He works the branch methodically, moving in short flights between sections, those curved claws finding purchase on every surface including the underside of branches where he hangs briefly, reading the bark from below.\n\nThe small theropod finds his tree.\n\n§N1§ launches immediately — that quick flutter, moving upward through the canopy layers, using the dense branching of the upper canopy as cover. The theropod is an agile climber but the upper canopy branches are too thin for its weight. He moves through them easily, those twenty-five centimetres of wingspan perfectly suited to the narrow gaps, and emerges above the canopy into the open air for a moment before dropping back into the safe density of the upper branches on the far side of the tree.\n\nThe theropod reaches the upper branches, finds them bending under its weight, and retreats.\n\n§N1§ grips a high branch and resumes reading the bark.\n\nAlong the way they see:\n* The small theropod retreating down the trunk to the mid-canopy\n* Early birds — feathered, toothed — working the same insects in the upper canopy\n* Large Jurassic dragonflies moving through the canopy gaps\n* Small early mammals on the forest floor below, emerging cautiously\n* The first flowering plants blooming at the forest edge, new and strange\n\nThe forest canopy is complex and layered and full of small things and he knows every centimetre of his section of it.\n\nHe gripped the underside of a branch with curved claws and read the bark from below, which almost nothing else in this forest can do.\nHe moved through the upper canopy branches too thin for the theropod and it had no answer.\nHe is the smallest pterosaur that has ever existed and the forest canopy was made for something exactly his size.\n\n✅ Food eaten: Large beetle, Spider, Small insects\n⚠️ Predator escaped: Small theropod (upper canopy — branches too thin for its weight)\n👀 Animals seen: Small theropod, Early toothed birds, Large dragonflies, Small mammals, First flowering plants\n\nGoodnight, Nemicolopterus. 🌙", "hatzegopteryx": "§N1§ walks through the forest of Hateg Island and nothing moves out of his way — because nothing here is large enough to know it should.\n\nHateg Island in the late Cretaceous is a small world. Seventy million years ago, rising sea levels isolated this piece of land from the European mainland, and the dinosaurs trapped here evolved in a different direction than their continental cousins. The sauropods shrank. The hadrosaurs shrank. Everything on this island became smaller over millions of years, adapting to the limited resources of island life. Everything except §N1§.\n\nHe is twelve metres across and his skull alone is nearly three metres long. He did not shrink. He grew.\n\nOn the mainland, large pterosaurs fish the open seas and avoid the giant theropods that rule the land. On Hateg Island there are no giant theropods. There is only §N1§, and he has filled the space that the absent predators left behind. He does not fish from the ocean surface like his relatives. He walks through the forest on all four limbs, that enormous skull carried on a thick, powerful neck unlike the slender necks of other giant pterosaurs, and he hunts whatever he finds.\n\nHe had always been different from the others of his kind. Where they soared above open water, he learned the forest floor. Where they dipped their beaks into the sea, he learned to read the undergrowth. For a long time he did not know if this was right. But the island taught him that different is not wrong — it is just shaped for a different place.\n\nBefore moving into the dense centre of the forest, he reads the ground carefully. A small crocodilian has been working the stream bank — he notes it and moves upslope, toward the section of forest where the dwarf dinosaurs graze. A group of dwarf hadrosaurs has been in this section all morning, their tracks fresh in the soft soil.\n\n§N2§ is working the forest edge, that enormous silhouette moving between the trees with the slow patience of something that has no reason to hurry.\n\nHe finds the dwarf hadrosaur separated from the group at the stream crossing — one of the island's small dinosaurs, no larger than a modern cow, the island's conditions having reduced what were once enormous animals to something manageable. §N1§'s skull closes on it with the full force of that thick neck and those robust jaws, built for this kind of prey rather than the fish that his relatives specialise in.\n\nHe was shaped differently from every other giant pterosaur. And it turned out the island needed exactly what he was.\n\nHe feeds in the forest clearing as the afternoon light comes through the canopy.\n\nAlong the way they see:\n* The dwarf hadrosaur herd moving away through the trees\n* Small island lizards watching from the bark of the old conifers\n* Early birds flitting through the canopy above\n* The small crocodilian returning to the stream bank below\n* Tiny island mammals emerging cautiously at the forest edge\n\nThe island holds everything it needs within its shores, and §N1§ is the piece that makes it complete.\n\nEvery place has something it needs that nothing else can provide. §N1§ found the island that needed him, and the island found the pterosaur that was built for it.\nHe was different from all the others of his kind. The island taught him that different is not a flaw — it is a fit.\nHe walks a forest that no other giant pterosaur walks, and it is entirely his own.\n\n✅ Food eaten: Dwarf hadrosaur, Island lizards\n⚠️ Rival avoided: Small crocodilian (moved upslope — not worth the encounter)\n👀 Animals seen: Dwarf hadrosaur herd, Island lizards, Early birds, Small crocodilian, Island mammals\n\nGoodnight, Hatzegopteryx. 🌙", "tapejara": "§N1§ cannot hide and he stopped trying a long time ago.\n\nThe crest rises from his skull like a sail — bone at the base, soft tissue above it, the whole structure taller than his body and coloured in the vivid reds and blues that Early Cretaceous Brazil has never seen on any other creature. Every animal in the forest and at the waterline can see him from a hundred metres. There is no camouflage available to something built like this, and for a long time, when he was young, that felt like a disadvantage.\n\nIt isn't.\n\nThe crest is who he is. It tells others of his kind exactly which individual he is from a distance — his specific pattern, his specific size, his specific combination of colour. He does not need to call across a crowded nesting site to be found. He does not need to fight his way to the front of a group to be seen. He simply exists, and the crest does the rest. Standing out, he learned, is not the same as being exposed. It is the same as being known.\n\nBefore moving to the fruiting trees, he reads the forest edge. A large fish has been visible near the surface of the lake below — a backup option if the fruit is not yet ripe. A larger pterosaur has been working the coastal thermals to the east, but the fruiting trees are inland and the coastal pterosaur does not come this far. The path is clear.\n\n§N2§ is already in the fruiting tree when he arrives — her own crest bright in the dappled forest light, unmistakeable even from the ground below.\n\n§N1§ lands beside her and begins selecting fruit. He is more adaptable than most pterosaurs — not specialised for fish, not specialised for insects, but capable of reading what the environment offers and taking the best of it. Today the environment offers ripe figs, and he takes them with a beak not designed for filter feeding or skimming but for choice, for flexibility, for doing more than one thing well.\n\nA small theropod at the base of the tree looks up at the two enormous crests visible through the canopy.\n\nIt decides the tree is occupied and moves on. Sometimes being clearly, visibly, undeniably present is its own protection. §N1§ has known this for years.\n\nHe eats until the figs are gone, then drops to the lake edge and takes two fish with quick, precise strikes — a different skill from a different part of the day. He is not the best fisher on this lake, not the best fruit-eater in this forest, but he is competent at both, and the combination makes him something no single specialist can be.\n\nAlong the way they see:\n* The small theropod moving away from the occupied tree\n* Spinosaurus relatives wading in the river shallows to the south\n* Other Tapejara at the lake edge, those crests rising above the waterline reeds\n* Large fish moving in slow circles in the clear lake water below\n* Early flowering plants blooming along the forest path — the newest, brightest things in the world\n\nThe Early Cretaceous forest is full of specialists, each one perfect for one thing. And then there is §N1§, bright and visible and good at several.\n\nHe learned early that the crest was not a burden — it was an introduction, offered to the world before he even arrived.\nHe is not the best at any one thing. He is genuinely good at many things, and the world has a place for that too.\nStanding out, he learned, is not the same as being alone. It is the same as being found.\n\n✅ Food eaten: Ripe figs, Two lake fish, Large insects\n⚠️ Predator deterred: Small theropod (crest visible from below — tree clearly occupied)\n👀 Animals seen: Small theropod, Spinosaurus relatives, Other Tapejara, Large fish, Early flowering plants\n\nGoodnight, Tapejara. 🌙", "pterodaustro": "Most animals at this lake look at §N1§ and see something strange.\n\nThe beak curves upward at the tip. The teeth — over a thousand of them, thin as bristles, packed in dense rows along the lower jaw — look nothing like the teeth of a hunter. He wades in the shallows with his head low, sweeping that curved beak back and forth through the water in slow arcs, and from a distance he looks like he is doing very little. The large fish ignore him. The crocodilians at the lake edge ignore him. Even the other pterosaurs working the open water above seem to look through him.\n\nThey are all underestimating him.\n\n§N1§ is filter-feeding — drawing water in through those bristle teeth, trapping the tiny crustaceans and plankton and invertebrates that live in the lake's upper layer, extracting more nutrition per hour than most of the animals at this lake will find in a day. He does not chase. He does not miss. He does not compete with the fish-hunters above because he is eating something they cannot even see. While they spend energy on pursuit and dive and miss, he sweeps and fills and sweeps again.\n\nHe may even be turning pink. The crustaceans he eats carry the same pigments that flamingos process — if he eats enough of them, for long enough, the colour builds in his feathers the way it does in the tall wading birds that will evolve to fill this same niche millions of years later. He and the flamingo have never met. They found the same solution independently. This is one of the quiet ways the world works.\n\nBefore wading into the deeper section, he reads the lake surface. A large fish has been moving through the shallows — at his size it is a potential risk, those jaws capable of grabbing a wading pterosaur from below. He moves to the shallower margin where the fish cannot follow, the water ankle-deep, the footing firm.\n\n§N2§ wades in beside him and they work the same section of shallows, those curved beaks sweeping in parallel arcs, unhurried.\n\nThe other pterosaurs return from their fishing passes above. Some have fish. Some do not — the open water was difficult today, the schools deep and fast. §N1§ has not stopped feeding since dawn. Patient work, steady work, the kind that does not look impressive until you count the hours.\n\nA crocodilian moves into the shallows from the bank.\n\n§N1§ walks calmly toward the bank — not a panicked sprint but a measured exit, reading the crocodilian's approach speed and calculating that there is time. He reaches the bank, spreads his wings, and launches into the lake thermal. From the air, the lake is a silver disc below him, the other pterosaurs working the surface, §N2§ still wading at the margin.\n\nHe circles once and descends back to the shallows on the far side.\n\nAlong the way they see:\n* The crocodilian settling into the vacated shallows\n* Fish-hunting pterosaurs returning to their perches above the lake\n* Wading birds — early forerunners of modern species — working the opposite shore\n* Small fish in the clear shallows below, moving in quick nervous schools\n* A flock of other Pterodaustro arriving from the north, those curved beaks unmistakeable\n\nThe lake provides everything he needs because he knows how to ask it differently than everyone else does.\n\nHe eats what no one else can see, which means he never competes and never goes hungry.\nPatient, steady, unhurried — while others chase, he sweeps, and the lake fills him every time.\nHe may be turning pink. It suits him.\n\n✅ Food eaten: Crustaceans, Plankton, Small invertebrates — thousands of them\n⚠️ Predator avoided: Crocodilian (calm measured exit — launched before it arrived)\n👀 Animals seen: Large fish, Crocodilian, Fish-hunting pterosaurs, Wading birds, Flock of other Pterodaustro\n\nGoodnight, Pterodaustro. 🌙", "nyctosaurus": "§N1§ has been airborne for three days and he is not tired.\n\nThe Western Interior Seaway stretches in every direction — no land visible, no cliff to perch on, no beach to rest on. He does not need one. Nyctosaurus has no wing claws at all, making him unique among pterosaurs — those claws that other species use to grip branches and cliff faces and rocky ledges are simply absent. He cannot land on anything that isn't flat. In exchange, his wings are the most purely aerodynamic of any pterosaur that has ever lived: long, narrow, built for nothing but the open air over open ocean.\n\nHe was made for exactly this. The belonging he searched for was never on the shore.\n\nWhen he was young, he watched the other pterosaurs perch on the coastal cliffs and grip the rock with their wing claws, and he could not do it. He watched them roost together in the trees and he could not join them there. He landed on the water once and the waves pushed him until he could barely launch again. For a time he did not know where he fit. The shore did not want him. The cliffs did not hold him.\n\nThen he found the open ocean, and the open ocean held him completely.\n\nThe thermal above the warm surface water has been carrying him north for two days without a single wingbeat. That antler-like crest — taller than his whole body, a structure that seems impossible until you see it working — catches the wind and acts as a sail, adding directional pressure to the thermal lift, guiding him the way a ship's sail guides a hull. He steers without effort. The ocean is not empty to him. It is home.\n\nBefore descending to the surface, he reads the water below. A large mosasaur has been tracking the fish school that he has been following for the last hour — that dark shape moving just below the surface, visible from altitude, its wake spreading behind it. He circles wide of the mosasaur's position and approaches the fish school from the windward side.\n\n§N2§ is already working the school's edge — that impossible crest catching the light, unmistakeable from two kilometres away. She found him out here three days ago, both of them reading the same thermal above the same warm current. The ocean is large but the currents bring those who belong to them together.\n\nHe descends to the surface and makes three fast passes — those long, narrow wings folding partially as he drops, the beak driving into the upper layer of the school. No wing claws to worry about. No perch to return to. He eats on the wing and climbs back to altitude in one motion, already reading the next thermal.\n\nA large shark fins below the surface near the school.\n\nHe sees it from thirty metres up and adjusts his next pass to the school's far side, where the shark's position makes the approach unlikely. He does not panic. He reads, adjusts, continues. The ocean teaches patience to everything that lives on it long enough.\n\nAlong the way they see:\n* The mosasaur moving through the deep water below, that enormous dark shape\n* The shark fin cutting the surface near the fish school\n* Sea turtles floating at the surface, those ancient passengers of the same ocean\n* Hesperornithines — toothed diving birds — working the school from below\n* Other Nyctosaurus riding the thermals at different altitudes, those crests like strange antlers against the sky\n\nThe ocean holds him and he holds himself and the thermal carries him north without asking anything in return.\n\nHe could not grip a cliff or roost in a tree, and for a time that felt like loss. Then he found the open ocean and it turned out he was built for the biggest place of all.\nThe belonging he looked for was not on the shore. It was three days out, above the warm current, exactly here.\nHe has been airborne for three days. He is exactly where he is supposed to be.\n\n✅ Food eaten: Fish from the surface school, Squid\n⚠️ Predator avoided: Large shark (read position from altitude — approached from far side)\n👀 Animals seen: Mosasaur, Large shark, Sea turtles, Hesperornithines, Other Nyctosaurus\n\nGoodnight, Nyctosaurus. 🌙", "tupandactylus": "§N1§ does not blend in, and he never has, and he has made his peace with it.\n\nThe crest is the thing. It rises from his skull in a great curved sail of bone and soft tissue — taller than his body, brightly patterned, visible from distances that make camouflage a theoretical concept. He flies over the Early Cretaceous forests of what will become Brazil and every animal below can see him coming. Every animal in the air can see him from a kilometre away. He carries his identity on his head like a flag, and for a long time, when he was young and the crest was still growing and the other animals watched him with wide eyes, he wished it were smaller.\n\nHe does not wish that anymore.\n\nCourage, he has learned, is not the absence of being seen. It is continuing anyway. It is flying the same route, eating the same fruit, landing at the same lake edge, fully visible, fully present, even when being seen feels like a risk. It is trusting that the crest — the thing that made him conspicuous, the thing he could not hide — is also the thing that matters. That the ones worth knowing will recognise it. That the ones who see it clearly will find him.\n\nBefore landing at the fruiting trees, he reads the approach. A large theropod has been in the area — tracks at the tree base, fresh. He circles the trees twice from altitude, confirming the theropod has moved on, before descending. He is visible during the whole approach. He lands anyway.\n\n§N2§ is in the adjacent tree, her own crest bright above the canopy, two sails visible from the air where before there was one. He found her the same way she found him — from a distance, that unmistakeable crest, neither of them hidden, both of them exactly themselves.\n\nHe selects fruit with care — those ripe figs, the ones at full colour, the ones that have been ready for exactly today. He eats methodically, that beak working through the fruit with the patience of something that knows good things are worth taking time with. He takes insects from the bark when the fruit runs thin. He adapts. He has always adapted.\n\nA smaller pterosaur lands nearby and watches §N1§ with something that might be curiosity.\n\nHe does not drive it away. There is room in this tree. There is room in this forest. Being clearly, visibly, recognisably yourself does not mean there is less space for anyone else. It means the space is easier to find.\n\nThe smaller pterosaur stays and eats from the lower branches.\n\nA large theropod returns to the tree line.\n\n§N1§ launches — that wide wingspread, that crest catching the afternoon light as he rises, fully visible as always, not apologising for a single centimetre of it. He climbs to the thermal above the forest canopy and turns south, the crest pointing into the wind, the forest spreading below him.\n\nAlong the way they see:\n* The large theropod watching from the tree line below\n* The smaller pterosaur continuing to eat from the lower branches\n* Other Tupandactylus in the distance, those crests visible above the canopy\n* Large fish in the river below, silver in the afternoon light\n* Early flowering plants at the forest edge, those newest, bravest additions to the world\n\nThe world is full of things that stand out. The bravest ones stopped apologising for it.\n\nHe learned that courage is not being invisible. It is being fully, clearly yourself — crest and all — and flying the route anyway.\nHe made room in the tree for the smaller pterosaur because being seen does not mean there is less space for others.\nHe rises into the afternoon thermal and the crest catches the light and he does not look down.\n\n✅ Food eaten: Ripe figs, Bark insects, Small fruit\n⚠️ Predator avoided: Large theropod (circled twice from altitude — confirmed clear before landing)\n👀 Animals seen: Large theropod, Smaller pterosaur, Other Tupandactylus, Large fish, Early flowering plants\n\nGoodnight, Tupandactylus. 🌙", "tupuxuara": "The Tupi people would one day name his kind the familiar spirit — the quiet guardian that watches over those it has chosen.\n\n§N1§ does not know this. He will not know it. But he moves through the Early Cretaceous forest of what will become Brazil with a quality that the name, when it eventually comes, will have tried to capture: a watchfulness that is not predatory, an awareness that extends beyond himself, a steady presence in the canopy that the smaller animals around him have come to read as something like safety.\n\nHe is related to Tapejara, that other crest-bearer of this forest, but where Tapejara is vivid and conspicuous, §N1§ carries his crest with a quieter weight. The crest is large and rounded, rising from his skull in a gentle curve rather than the dramatic sail-shapes of some of his relatives. His beak is toothless — smooth and clean, built for the precision of selection rather than the force of attack. He eats fish when the rivers are high and fruit when the trees are full, which makes him something rare in this forest: genuinely flexible, ungoverned by a single hunger.\n\nBefore moving to the fruiting trees, he reads the canopy from above. A large theropod has been working the forest edge — its tracks visible from altitude, the disturbed vegetation tracing its morning route. He routes deeper into the closed canopy where the theropod's size becomes a disadvantage. He moves without urgency.\n\n§N2§ is at the fig tree when he arrives, already feeding. He lands beside her and begins selecting fruit with the same careful attention he gives to everything.\n\nA smaller pterosaur — one of the juvenile Tapejara that has been ranging this section of forest alone since its parents moved to the coastal cliffs — lands awkwardly in the adjacent branch. It is young enough to be uncertain in the canopy, its crest still growing, its flight not yet fully sure. It watches §N1§ feed and does not approach.\n\n§N1§ does not drive it away. He shifts along the branch to make room. The juvenile reads the shift and moves closer, cautiously, and begins eating from the lower fruit clusters.\n\nThey eat together for twenty minutes. The juvenile's landing improves on each small repositioning. It watches, without knowing it is watching, how he reads the branch before he moves onto it, how he selects fruit by smell before touch, how he pauses at intervals and reads the canopy before continuing.\n\nA familiar spirit, the Tupi will say. A guardian that watches over you without asking to be thanked.\n\n§N1§ finishes his fruit, spreads his wings, and climbs toward the river where the fish are running. The juvenile watches him go and stays in the fig tree, eating, a little more at home in the canopy than it was an hour ago.\n\nAlong the way they see:\n* The large theropod working the forest edge below, following a different route\n* Tapejara in the distant canopy, those brighter crests visible through the leaves\n* Large fish visible in the river below, silver in the afternoon light\n* Early flowering plants at the forest margin, the newest things in the world\n* Other pterosaurs riding the thermals above the river valley\n\nThe forest holds him the way it holds everything it needs.\n\nHe made room on the branch without being asked. The juvenile ate beside him and learned without knowing it was learning.\nA familiar spirit is not someone who announces their presence. It is someone whose presence makes things a little easier.\nHe will not know the name the Tupi give his kind. He is living it regardless.\n\n✅ Food eaten: Ripe figs, River fish, Small fruit\n⚠️ Predator avoided: Large theropod (read tracks from altitude — routed into closed canopy)\n👀 Animals seen: Large theropod, Tapejara, Large river fish, Early flowering plants, Other pterosaurs\n\nGoodnight, Tupuxuara. 🌙", "istiodactylus": "§N1§ has teeth that no other pterosaur has, and for a long time he did not know what to make of them.\n\nThey are triangular, interlocking, arranged in a bill that is wide and slightly flattened — not the long needle-teeth of the fish-catchers, not the bristle-filters of Pterodaustro, not the toothless precision of the fruit-eaters. Something different. Something that looks, when the bill is closed, like the most efficient pair of scissors the Early Cretaceous has produced. He tried fishing with them when he was young, watching the other pterosaurs and attempting the same low passes, the same surface strikes. The teeth were not built for it. He dropped more fish than he caught.\n\nHe was not built for fishing. He took longer to understand what he was built for.\n\nThe Early Cretaceous coast of what will become England is rich and complicated — rivers meeting the sea, estuaries thick with life, the land behind them dense with conifers and the first flowering plants. Things die here, as they die everywhere, and when they do they leave behind something that needs processing. Carcasses on the estuary bank. Large fish stranded in the shallows as the tide pulls back. Dead marine reptiles at the water's edge.\n\nThose interlocking triangular teeth, it turns out, slice through flesh with a precision that tearing and crushing cannot match. He is a scavenger — a processor of what the sea and the river leave behind — and once he understood this the teeth stopped feeling like the wrong answer to the wrong question and started feeling like exactly the right tool for the job that needed doing.\n\nBefore descending to the estuary bank, he reads the situation from above. A large theropod is working the tree line — he gives it wide clearance. A group of early birds has already found the stranded fish but they are too small to make significant progress. He descends.\n\n§N2§ arrives from the coastal thermal at the same moment, those same unusual teeth, that same wide bill, reading the same opportunity.\n\nThey work the carcass together — those scissor-teeth doing what they were built to do, efficient and thorough, cleaning what the sea left behind and returning it to the ecosystem in a form everything else can use.\n\nAn Iguanodon at the tree line watches him with mild curiosity and turns back to the conifers.\n\nHe was not built for fishing. He spent too long trying to be something he wasn't. Then he understood his teeth, and what they were for, and he has not been confused since.\n\nYou are built for something. The thing you are built for may not be obvious at first. It may not be what everyone else around you is doing. But the tools you have are clues, if you pay attention to them.\n\nAlong the way they see:\n* The large theropod moving along the tree line, following its own route\n* Iguanodons grazing the conifer stands at the forest edge\n* Early birds working the shallows in quick nervous groups\n* Marine reptiles in the deeper estuary water\n* Other Istiodactylus circling the coastal updrafts above\n\nThe estuary gives back what the sea brings in, and §N1§ is part of how.\n\nHe spent too long trying to fish like the others, when his teeth were built for something else entirely.\nYou are built for something. The tools you carry are clues, if you pay attention to them.\nHe understood his teeth and has not been confused since.\n\n✅ Food eaten: Stranded fish, Carrion at the estuary edge\n⚠️ Predator avoided: Large theropod (read position from altitude — wide clearance on descent)\n👀 Animals seen: Large theropod, Iguanodons, Early birds, Marine reptiles, Other Istiodactylus\n\nGoodnight, Istiodactylus. 🌙", "thalassodromeus": "The crest is seventy-five percent of his skull length, and §N1§ has been carrying it his whole life.\n\nFrom the outside, it looks impossible — that enormous sail of bone rising from his head, taller than any other structure on his body, catching the coastal wind, pulling at his neck on every turbulent updraft. Other pterosaurs have crests. None of them have this. The first time he became fully aware of it — young, still learning to hold his flight line in the sea wind — he understood that his life would require him to carry something that most animals never have to.\n\nHe has carried it. And in carrying it, he has found what it was for.\n\nHis name means sea runner, and the name is earned. His lower jaw is long and slightly rounded at the tip — built for the skim, that low fast flight along the water surface with the lower jaw cutting through the upper layer, the fish taken in the moment of contact. The crest, which seemed like a liability in the turbulence above the coast, is a sail in the consistent sea wind — it catches the pressure and adds to his directional stability at surface level, where stability matters most. The thing that seemed impossible to carry is the thing that makes his technique work.\n\nBefore descending to the surface, he reads the wind and the water. The sea wind is coming from the northwest — consistent, which means the skim will hold its line. A large shark has been working the fish school he is targeting. He routes to the school's eastern edge where the shark's approach angle makes surface interference unlikely.\n\n§N2§ is already skimming the western edge of the same school, that enormous crest visible from five hundred metres.\n\n§N1§ descends and begins. The lower jaw enters the water at the exact speed and angle that years of practice have made instinctive — the contact, the fish, the lift, the swallow on the climb. He makes four passes through the morning, the crest holding his line in the sea wind each time, the gift of it finally undeniable.\n\nA large fish breaches below him on the third pass, close enough to disrupt the skim line.\n\n§N1§ pulls up hard — that enormous crest catching the wind and helping the climb in the same motion — and circles back to the start of the run. He adjusts his line six metres north and makes the pass again.\n\nYou carry your gifts even before you understand them. Even when they feel like too much. Even when everyone around you is carrying something lighter and the wind is in your face and the crest is pulling at your neck and you cannot yet see what it is for.\n\nIt is for something. It is always for something.\n\nAlong the way they see:\n* The large shark circling below the fish school's western edge\n* §N2§ skimming the opposite side, that second enormous crest against the sea horizon\n* Sea turtles at the surface between passes, those ancient unhurried shapes\n* Tupuxuara in the distant coastal thermal, watching the sea from altitude\n* Spinosaurus relatives wading the river mouth to the south\n\nThe sea wind is consistent this morning, which means the skimming is good.\n\nHe has been carrying the crest his whole life, and it turned out to be the thing that made his technique possible.\nYou carry your gifts even before you understand them. Even when they feel like too much.\nThe thing that seemed impossible to carry is the thing that makes everything else work.\n\n✅ Food eaten: Fish taken on four skimming passes, Squid\n⚠️ Predator avoided: Large shark (eastern edge of school — shark's approach angle didn't reach)\n👀 Animals seen: Large shark, §N2§, Sea turtles, Tupuxuara, Spinosaurus relatives\n\nGoodnight, Thalassodromeus. 🌙", "cryodrakon": "§N1§ was named for ice, but the world he lived in was warm.\n\nThe frozen dragon — that is what his name will mean, when humans find his bones in the cold Alberta rock seventy-five million years from now and try to imagine what walked this land. They will find him in the badlands, the bones pressed into stone, and the cold of the Canadian winter will be the first thing they think of. But when §N1§ spread his ten-metre wings above the Late Cretaceous interior of what will become Canada, the air was warm and thick, the inland sea still filling the heart of the continent, the forests green and dense and full of hadrosaurs and tyrannosaurs and the small scurrying mammals that will one day inherit everything.\n\nHe is a cold-country giant in a warm world, which is its own kind of contradiction — and he has made his peace with contradictions.\n\nHe stands five metres tall on the ground, that long neck carrying his skull above the undergrowth, those huge eyes reading the landscape in every direction. He walks on all fours when he is not flying, the wing-finger knuckles folded back, those enormous wings compressed. He moves through the Late Cretaceous forest with the slow authority of something that has calculated, correctly, that very little here can threaten an adult of his size.\n\nBefore ranging out from the river stand, he reads the ground. A tyrannosaur has been through this section — not T. rex, but one of its relatives, large enough to be a consideration for a pterosaur on the ground in open terrain. The scent is two hours old, heading east. He moves west, toward the shallow river bend where the small dinosaurs come to drink.\n\n§N2§ is already at the river, wading in the shallows, that enormous form reflected in the still water of the bend.\n\n§N1§ wades in beside her. The water is warm and clear and the bottom is full of the small life that a pterosaur his size needs in quantity — small lizards, mammals at the water's edge, the occasional fish moving through the shallows. He strikes three times in the first few minutes, that long beak snapping shut with the precision of something that has been doing this in one form or another for a very long time.\n\nA juvenile hadrosaur comes to drink at the river bend, separated from its herd by twenty metres.\n\n§N1§ reads the situation from the water — the juvenile's distance from the herd, the depth of the river between them, the angle of the sun that puts the hadrosaur looking into the light. He moves.\n\nThe hadrosaur sees him and calls. The herd adjusts. He was already in range.\n\nHe feeds at the river bend as the afternoon warms. The tyrannosaur scent on the air is still east. The river is still warm. The inland sea catches the light to the south.\n\nHe was named for ice that did not come until long after he was gone. He lived in warmth and plenty and ruled a landscape that will one day be frozen under winter skies and dug through by paleontologists who will hold his bones and try to imagine this afternoon.\n\nThey will not quite manage it. This afternoon is too alive.\n\nSome things cannot be fully known from the outside. Some things can only be understood by being in them — by standing in the warm Cretaceous river with the hadrosaur calls fading into the treeline, feeling the sun on the wings, knowing that the world is exactly this, right now, and you are exactly here in it.\n\nAlong the way they see:\n* The hadrosaur herd moving away through the treeline\n* A tyrannosaur relative emerging briefly from the forest to the east before retreating\n* Early birds in the river willows, those small feathered descendants of the great lineage\n* Ankylosaurs moving slowly through the undergrowth on the far bank\n* The inland sea catching the light on the southern horizon\n\nThe warm Cretaceous afternoon holds him completely.\n\nHe was named for ice that didn't come for millions of years. He lived in warmth and knew it.\nSome things cannot be understood from the outside. Some things can only be known by being in them.\nThis afternoon is too alive to be fully imagined later. He is living it now, which is the only way.\n\n✅ Food eaten: Small lizards, Mammals, River fish, Juvenile hadrosaur\n⚠️ Predator avoided: Tyrannosaur relative (read scent trail — moved west before it returned)\n👀 Animals seen: Hadrosaur herd, Tyrannosaur relative, Early birds, Ankylosaurs, The inland sea\n\nGoodnight, Cryodrakon. 🌙"};
const C=CORE.categories;
const A=CORE.animals;
const S=STORIES;

function gc(k){ return C.find(function(c){ return c.key===k; }); }
function ga(c){ return Object.keys(A).filter(function(k){ return A[k].category===c; }).map(function(k){ var a=A[k]; a.key=k; return a; }); }

function getStory(k,n1,n2){
  var t = S[k] || "Goodnight. \uD83C\uDF19";
  return t.split("\u00A7N1\u00A7").join(n1).split("\u00A7N2\u00A7").join(n2);
}

function makeChunks(t){
  var sents=[]; var cur="";
  for(var i=0;i<t.length;i++){
    cur+=t[i];
    if((t[i]==="."||t[i]==="!"||t[i]==="?")&&cur.trim().length>20){
      sents.push(cur.trim()); cur="";
    }
  }
  if(cur.trim()) sents.push(cur.trim());
  if(!sents.length) return [t];
  var n=Math.min(7,sents.length);
  var z=Math.ceil(sents.length/n);
  var out=[];
  for(var i=0;i<sents.length;i+=z) out.push(sents.slice(i,i+z).join(" "));
  return out;
}

function getRead(){ try{ return JSON.parse(localStorage.getItem("read")||"{}"); }catch(e){ return {}; } }
function markRead(k){ try{ var r=getRead(); r[k]=true; localStorage.setItem("read",JSON.stringify(r)); }catch(e){} }

// State
var st = { pg:"home", cat:null, ak:null, n1:"Carson", n2:"Avery", cks:[], idx:0, typed:"", typing:false, tm:null };
var voiceOn = false;

function setState(p){ Object.assign(st,p); render(); }

// Navigation - use data attributes on buttons, attach listeners after render
function render(){
  var el = document.getElementById("app");
  var ci = st.cat ? gc(st.cat) : null;
  var an = st.ak ? A[st.ak] : null;
  var bg = an ? an.bg : ci ? ci.bg : "#010b14";
  document.body.style.background = bg;

  if(st.pg==="home"){ renderHome(el); return; }
  if(st.pg==="cat" && ci){ renderCat(el,ci); return; }
  if(st.pg==="info" && an){ renderInfo(el,an,ci); return; }
  if(st.pg==="story" && an){ renderStory(el,an); return; }
}

function el(tag,attrs,inner){
  var s="<"+tag;
  for(var k in attrs) s+=" "+k+"=\""+attrs[k].toString().replace(/"/g,"&quot;")+"\"";
  return s+">"+inner+"</"+tag+">";
}

function btn(label,color,full){
  return "<button class=\"abtn\" data-color=\""+color+"\" style=\"width:"+(full?"100%":"auto")+";display:block;margin-bottom:8px;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+color+"33,"+color+"55);border:1px solid "+color+"77\">"+label+"</button>";
}

function renderHome(el){
  var html = "<div class=\"s\"><div style=\"text-align:center;padding:24px 0 18px\"><div style=\"font-size:48px\">🌙</div><h1 style=\"font-size:20px;margin:8px 0 4px\">Bedtime Animal Adventures</h1><p style=\"color:rgba(255,255,255,.45);font-size:13px\">Choose a habitat</p></div><div class=\"g3\">";
  C.forEach(function(c){
    html += "<button class=\"catbtn\" data-cat=\""+c.key+"\" style=\"background:linear-gradient(135deg,"+c.color+"0a,"+c.color+"20);border:1px solid "+c.color+"44;border-radius:12px;padding:10px 4px;text-align:center;width:100%\"><div style=\"font-size:22px\">"+c.emoji+"</div><div style=\"font-size:9px;color:"+c.color+";font-weight:bold;margin-top:3px;line-height:1.2\">"+c.label+"</div><div style=\"font-size:8px;color:rgba(255,255,255,.3);margin-top:2px\">"+ga(c.key).length+"</div></button>";
  });
  html += "</div></div>";
  el.innerHTML = html;
  el.querySelectorAll(".catbtn").forEach(function(b){
    b.addEventListener("click", function(){ setState({pg:"cat",cat:this.dataset.cat}); });
  });
}

function renderCat(el,ci){
  var read = getRead();
  var html = "<div class=\"s\"><button class=\"back homebtn\">← Back</button><div style=\"text-align:center;margin-bottom:18px\"><div style=\"font-size:38px\">"+ci.emoji+"</div><h2 style=\"color:"+ci.color+";margin:6px 0\">"+ci.label+"</h2><p style=\"color:rgba(255,255,255,.4);font-size:13px\">"+ci.desc+"</p></div><div class=\"g2\">";
  ga(st.cat).forEach(function(a){
    var done = read[a.key];
    html += "<button class=\"anbtn\" data-key=\""+a.key+"\" style=\"background:linear-gradient(135deg,"+a.accent+(done?"44":"0a")+","+a.accent+(done?"66":"20")+");border:"+(done?"2":"1")+"px solid "+a.accent+(done?"99":"44")+";border-radius:12px;padding:14px 8px;text-align:center;position:relative\">"+(done?"<div style=\"position:absolute;top:5px;right:7px;font-size:12px\">✅</div>":"")+"<div style=\"font-size:30px\">"+a.emoji+"</div><div style=\"font-size:12px;color:"+a.accent+";font-weight:bold;margin-top:5px\">"+a.name+"</div></button>";
  });
  html += "</div></div>";
  el.innerHTML = html;
  el.querySelector(".homebtn").addEventListener("click", function(){ setState({pg:"home",cat:null,ak:null}); });
  el.querySelectorAll(".anbtn").forEach(function(b){
    var pressTimer = null;
    b.addEventListener("click", function(){ setState({pg:"info",ak:this.dataset.key}); });
    b.addEventListener("mousedown", function(){
      var key = this.dataset.key;
      pressTimer = setTimeout(function(){
        pressTimer = null;
        var r = getRead();
        if(r[key]){ delete r[key]; } else { r[key] = true; }
        try{ localStorage.setItem("read", JSON.stringify(r)); }catch(e){}
        setState({pg:"cat"});
      }, 600);
    });
    b.addEventListener("mouseup", function(){ clearTimeout(pressTimer); });
    b.addEventListener("mouseleave", function(){ clearTimeout(pressTimer); });
    b.addEventListener("touchstart", function(e){
      var key = this.dataset.key;
      var self = this;
      pressTimer = setTimeout(function(){
        pressTimer = null;
        var r = getRead();
        if(r[key]){ delete r[key]; } else { r[key] = true; }
        try{ localStorage.setItem("read", JSON.stringify(r)); }catch(e){}
        // vibrate if supported
        if(navigator.vibrate) navigator.vibrate(50);
        setState({pg:"cat"});
      }, 600);
    }, {passive:false});
    b.addEventListener("touchend", function(e){
      if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; }
      else { e.preventDefault(); }
    });
    b.addEventListener("touchmove", function(){ clearTimeout(pressTimer); pressTimer=null; });
    b.addEventListener("contextmenu", function(e){ e.preventDefault(); });
  });
}

function renderInfo(el,an,ci){
  var ac = an.accent;
  var suffix = Math.random()<0.5?" eating":" teeth";
  var imgurl = "https://www.google.com/search?q="+encodeURIComponent(an.name+suffix)+"&tbm=isch";
  var html = "<div class=\"s\">"
    +"<button class=\"back catbtn2\">← Back</button>"
