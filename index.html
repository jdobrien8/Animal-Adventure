l where midges gathered in certain light conditions, the reed beds where damselflies sheltered and occasionally became prey themselves.\n\n§N2§ was already over the deep end, working a cloud of midges that had hatched overnight. §N1§ banked toward them. The midges were visible from fifteen metres as a column of tiny moving shapes in the morning light. He locked onto a single midge at the column's edge — not the whole cloud, but one specific animal — and made the calculation his brain was built to make: not where the midge was, but where it would be in precisely the amount of time it would take him to travel the distance between them. He went to that point.\n\nThe catch was invisible to any observer watching from the bank. The midge was there and then it was not there and §N1§ was already locked onto the next one.\n\nDragonflies caught ninety-five percent of everything they chased. No other predator on Earth came close to this number. Lions caught around thirty percent. Great white sharks around fifty. The dragonfly's brain devoted nearly eighty percent of its processing power to vision and flight control — a flying eye with legs attached — and the result was a success rate that made every other predator look like it was trying.\n\nA frog launched from the lily pad with explosive suddenness — that sticky tongue, aimed at §N2§ hovering two feet above the water. §N2§ was gone before the tongue arrived. Dragonfly compound eyes processed movement at a frame rate four times faster than the frog's nervous system operated. By the time the frog's strike was committed, §N2§ had already registered the launch, calculated the trajectory, and departed the relevant piece of airspace. The tongue hit water. The frog sat on its pad looking at the sky.\n\n§N1§ worked the pond for two more hours, hunting through the warming morning as the insect activity peaked. He ate seventeen midges, two mosquitoes, a small damselfly, and a moth that had been resting too long on the water surface. He ate all of them in flight, processing each one in the basket his legs formed beneath his body, not landing once.\n\nA kingfisher hit the water at the pond's far end and came up with a small fish, disappearing into the willows trailing a glitter of droplets. A grass snake crossed the still section near the bank in a perfect S-curve, its head raised slightly above the surface. Water striders skated across the mirror-calm shallows near the reed bed, their feet dimpling the surface tension without breaking through.\n\n§N1§ and §N2§ found warm reeds in the late morning — two specific stems that caught the sun at the right angle — and rested with their wings held flat and perpendicular to their bodies, those enormous compound eyes still scanning even in stillness, the pond continuing its business below them.\n\nGoodnight, dragonflies. 🌙","spinosaurus":"§N1§ waded into the Cretaceous river delta and the crocodilians moved — with the considered repositioning of animals that had developed reasonable policies about sharing waterways with fifty-foot theropods.\n\nHe was the largest carnivorous dinosaur ever found. And different from the other large theropods: built for water. Nostrils positioned high on his skull. Partially webbed feet. Conical fish-catching teeth that interlocked like a crocodile's. He was a dinosaur that had decided the river was better.\n\nHe stood still in the current and tracked a giant prehistoric fish through the water pressure changes his snout detected.\n\nHe struck from above.\n\nA Carcharodontosaurus appeared at the bank — that other giant predator, nearly his size, watching from its element. They regarded each other across the water. The Carcharodontosaurus could enter the river. He chose not to. §N1§ was in his element and the Carcharodontosaurus understood this.\n\n§N2§ was downstream, her sail visible above the surface.\n\nGoodnight, Spinosaurus. 🌙","black_widow":"The old woodpile behind the garden shed had been §N1§'s home for two seasons — a perfect maze of dry gaps between the logs, sheltered from rain, warm from the afternoon sun that hit the south-facing wall for six hours every day. His web filled the widest gap: not the pretty spiral orb-webs that garden spiders built, but the three-dimensional tangle that black widows built — irregular, strong as fishing line, invisible in dim light, and engineered with a specific purpose. The threads near the ground were trigger threads. Anything that touched them sent a vibration up through the whole web instantly, arriving at §N1§ in the centre before the trapped animal had even registered it was stuck.\n\nHe spent the first part of the evening doing maintenance. He walked every thread with his front legs, feeling for damage from the wind that had moved through the woodpile in the afternoon, finding two broken sections and replacing them with fresh silk from his spinnerets. The silk came out liquid and set hard in seconds. The web was his whole world and he kept it perfect.\n\n§N2§ was two logs over, doing the same thing.\n\nA moth blundered into the lower section of §N1§'s web just after dark — big, powdery-winged, completely unprepared. The moment it touched the trigger threads the vibration shot upward and §N1§ was moving before the moth had even started struggling. He crossed the web in less than a second and wrapped the moth in silk — spinning it with his back legs, rotating it thirty times in four seconds, the silk binding tight around the wings and legs — then delivered one precise bite. The venom worked in seconds. He hung the moth carefully in the upper section of the web, his larder, and returned to the centre to wait.\n\nThe waiting was most of it. Black widows waited with a patience that was not patience exactly — patience implied awareness of time passing — but a complete, suspended readiness that could last hours between catches.\n\nLater a mud dauber wasp appeared at the woodpile's edge and §N1§ went completely still. Mud daubers were the one thing that genuinely alarmed him. These wasps hunted black widows specifically — not to eat them, but to paralyse them and pack them into mud cells as living, fresh food for their larvae. They were good at it. They knew where to look and they knew how to approach without triggering the web's alarm system. §N1§ pressed into the deepest corner of the web's structure and did not move for fourteen full minutes while the wasp investigated the area. He could feel its footsteps through the bench surface — a different vibration from anything the web detected, transmitted through wood.\n\nThe wasp eventually flew toward the fence.\n\nHe emerged slowly, checked every thread, and found the web undisturbed.\n\n§N2§ caught a grasshopper in the next hour — he could feel the violent vibration of something large struggling through the woodpile's vibrations, and then the specific pattern of a large prey item being wrapped.\n\nA gecko watched from the stone wall. Moths continued their circles around the kitchen light. Crickets sang from the grass.\n\n§N1§ settled into the centre of his web as the garden grew quiet, eight eyes open in the dark, waiting for the next vibration that would tell him the night wasn't finished yet.\n\nGoodnight, black widows. 🌙","sarcosuchus":"§N1§ had been here since before dawn, and the river had forgotten about him.\n\nThe animals that came to drink had incorporated his presence into their understanding of the bank — the log shape, the stillness — and had stopped processing it as threat. The fish fed around his feet. The birds landed behind him. The small pterosaurs had resumed fishing.\n\nHe was forty feet long. He weighed eight tonnes. He had a hundred and thirty teeth and the patience of geology.\n\nAn Iguanodon appeared at the bank in the midmorning — come to drink at the crossing it had been using for three seasons. It approached with its head up, reading the bank with the alert attention of a prey animal that had survived this long by reading banks correctly.\n\nIt did not read the bank correctly today.\n\n§N1§'s strike covered twelve feet in under a second. He had been waiting in exactly this position for exactly this moment since before sunrise.\n\nA Spinosaurus appeared at the river bend — drawn by the disturbance. They regarded each other across the water. §N1§ opened his jaws: all those teeth, that gape, the communication of an animal that had decided it was not moving.\n\nThe Spinosaurus moved upstream.\n\n§N2§ was downstream, doing her own reading of her own section of river.\n\nGoodnight, Sarcosuchus. 🌙","brachiosaurus":"§N1§ ate from the treetops, forty feet above the ground, which was the specific advantage Brachiosaurus had developed: the neck rising upward rather than extending horizontally, giving access to the canopy that Diplodocus, feeding at ground level, couldn't reach. The food was there and it was only hers. No competition.\n\nShe moved through the forest with footsteps registering as tremors on every animal within a hundred metres, and those animals adjusted accordingly — the practical recognition that something very large was moving and standing exactly where it was stepping was impractical.\n\nThe Allosaurus pack had been at the forest's edge since morning. She had been aware of them since the first hour, the disturbance they created in smaller animals propagating outward.\n\nShe turned toward the nearest one.\n\nNot aggression. Information. A sixty-tonne animal turning toward you from forty feet above was a detailed communication about the geometry of the situation. The Allosaurus received it and revised its assessment.\n\nThe pack moved south.\n\n§N2§ was in the adjacent forest section, her silhouette visible through the canopy — that long neck, unmistakable.\n\nThe Jurassic sky was enormous above the ancient trees.\n\nThe Allosaurus pack had been at the forest's edge since morning — she had been aware of them since the first hour, the disturbance they created propagating outward through the smaller animals. When one moved too close she turned toward it from sixty feet above, and the specific experience of being regarded by sixty tonnes of dinosaur from that height clarified the calculation immediately. The pack moved south.\n\nWhen one Allosaurus moved too close she turned toward it from sixty feet above — and the specific experience of being regarded by sixty tonnes of dinosaur from that height clarified the calculation. The Allosaurus moved south.\n\nThe Allosaurus pack had been at the forest's edge all morning. When one moved too close she turned toward it from sixty feet above — and the experience of being regarded by sixty tonnes of dinosaur from that height provided the necessary clarity. The pack moved south.\n\nGoodnight, Brachiosaurus. 🌙","koala":"§N1§ chose her tree the way she chose everything — by smell, and by a calculation so deeply built into her that it operated without anything she would recognise as thought.\n\nShe stood at the base of three eucalyptus trees and inhaled at each trunk in turn. The first was a grey gum — her preferred species — but its chemical profile told her it was carrying a heavy toxin load today, the kind that varied with temperature and soil moisture and the specific stress of the season. The second was a manna gum, less preferred, but today its terpene concentration was manageable, its nutritional content reasonable. The third was a blue gum, high toxins, skip it.\n\nShe climbed the manna gum. Twenty-five feet up she found the fork she wanted and settled into it, her two thumbs and three fingers gripping the branch with the automatic certainty of an animal that had been born into trees and had never needed to think about falling.\n\nShe ate for forty minutes — methodically, choosing each branch, each stem cluster, processing the leaves with teeth that were built for grinding tough, fibrous plant material down to a paste that her specialised digestive system could then take twelve hours to process. The processing took so much energy that she had almost nothing left for anything else. This was the koala's bargain: eat what nothing else wanted, and pay for it by sleeping for twenty-two hours a day.\n\nShe was selecting her sleeping position — testing the angle of the fork, the warmth of the bark in the late sun, the shelter from the wind that was picking up from the southwest — when the python arrived.\n\nShe smelled it before she saw it. That specific cold-reptile scent coming from below, moving up the trunk. She gave the sound that koalas rarely made and that humans always found surprising — a deep, guttural bellow that was genuinely loud for an animal her size, a sound that carried through the bush and said: I am here and I know you are here.\n\nThe python paused on the trunk below her.\n\nShe climbed to the outermost branches where her weight was manageable and the python's weight was not, and pressed herself flat along a thin limb. The bark was rough against her chest. She watched the python's movement below, its tongue flickering, its body crossing the trunk with that liquid patience.\n\nIt crossed to the adjacent tree.\n\nShe descended slowly to her original fork when the scent had faded, settled into the angle of the wood, and let her body do what it needed to do. Her temperature dropped slightly. Her heart rate lowered. Her breathing slowed.\n\n§N2§ was in the tree's upper crown — she had been there all afternoon, visible as a grey shape pressed into the highest fork.\n\nThe bush grew quiet around both of them as the long Australian night began.\n\nA powerful owl had been calling from the grove's far end all evening — those large owls, the one genuine aerial threat to koalas. §N1§ climbed to the uppermost branches where the owl's landing approach was complicated by the thin outermost wood, and pressed flat against a branch in the dense crown. The owl called twice more and went quiet, moving to hunt the open ground beyond the grove.\n\nGoodnight, koalas. 🌙","kangaroo":"§N1§ stood six feet tall on the red plain and held perfectly still, his nose reading the air that came from the north.\n\nRain. Forty miles north, maybe fifty — the specific smell of wet earth and new grass that his body had been calibrated to detect across enormous distances, because in the Australian outback the distance between one patch of green and the next could be the difference between surviving a dry season and not. He had been smelling it since midmorning. By evening it was stronger.\n\nHe gave no signal. He didn't need to. The mob of twenty-three animals had been reading his posture all afternoon, and when he turned north and began moving, they moved with him as if the decision had been shared.\n\nThe dingo pack found them at the dry creek bed two hours into the journey. Five animals — he could count them in the moonlight — moving in the loose, cooperative pattern that dingoes used when they were working a mob rather than chasing a single animal. They spread wide, looking for the joey that was slightly too slow, the female whose pouch-weight made her turn a fraction late. §N1§ positioned himself at the mob's rear flank and faced the nearest dingo.\n\nA kangaroo kick — those massive hind legs with their sharp claws, driven by the most powerful leg muscles relative to body weight of any marsupial — could break a dingo's ribs or jaw. Every dingo in Australia knew this. The question was always whether the target was worth the risk. §N1§ was fully grown and facing them directly.\n\nThe lead dingo tested the distance. §N1§ leaned back on his tail — that thick, muscular counterbalance that let him pivot his whole body into a kick — and the lead dingo stopped. They held positions for ninety seconds, reading each other across the moonlit creek bed.\n\nThe pack moved south.\n\n§N2§ was already moving again, her joey's head visible at the pouch opening, those large dark eyes watching everything. The mob reformed around them both and continued north.\n\nBy dawn the smell of rain was stronger and the grass at the horizon was visibly greener than the plain they had crossed. §N1§ dropped his head and ate the first green stems of the season, the mob spreading around him across the new growth.\n\nThe outback sky turned orange and then gold.\n\nA wedge-tailed eagle circled high above the mob in the morning — those enormous wings, that wide soaring pattern. The mob tightened automatically, the joeys pressed close to their mothers. §N1§ watched the eagle's position as he grazed, tracking it through its circuit until it climbed to altitude and moved northeast. The mob spread out again.\n\nGoodnight, kangaroos. 🌙","iguanodon":"§N1§ had a thumb spike, and he was not shy about it.\n\nThe spike — rigid, keratinous, pointing at right angles from his hand, the size of a small dagger — had been found in the fossil record in configurations that made its purpose clear. A weapon, available when his primary defence of size was tested.\n\nThe Baryonyx had come from the river direction, following the scent of the berry patch. It was a fish-eater primarily, but the Early Cretaceous was not a strictly observed cafeteria.\n\n§N1§ turned toward it. He was on two legs — at full bipedal stance, fifteen feet tall, thumb spikes at a useful height. He took one deliberate step forward.\n\nThe Baryonyx processed the size differential, then the thumb spikes, then turned around and went back to the river.\n\n§N1§ returned to four feet and resumed eating the berries.\n\n§N2§ appeared from the forest edge, walking on all fours with the comfortable efficiency of Iguanodon at rest, switching to two legs briefly to reach a high branch.\n\nThe Early Cretaceous was warm and green and full of the sound of insects.\n\nA pack of small dromaeosaurs appeared at the fern meadow's edge — those feathered, sickle-clawed hunters that worked in groups to take prey larger than themselves. §N1§ rose to two legs immediately, presenting his full height and both thumb spikes outward. The dromaeosaurs assessed the size differential and the spikes, circled once at a safe distance, and moved into the forest in search of something less defended.\n\nA pack of small dromaeosaurs appeared at the fern meadow's edge — those feathered sickle-clawed hunters that worked in groups. §N1§ rose to two legs immediately, presenting his full height and both thumb spikes outward. They circled once at a safe distance and moved into the forest in search of something less defended.\n\nGoodnight, Iguanodon. 🌙","tiger_beetle":"§N1§ stood at the sandy path's edge in the afternoon light, iridescent green — that metallic sheen produced by the microstructure of his carapace, structural colour generated not by pigment but by the physical interference of light waves.\n\nHe moved. The world blurred.\n\nAt full sprint, tiger beetles ran so fast that the images their eyes received arrived faster than their brains could process — a genuine period of perceptual blindness. They compensated by stopping: sprint to a new position, stop, relocate the prey, sprint again. Stop, look, sprint.\n\nThe ant had moved slightly right.\n\nHe stopped. Relocated. Ant there, four centimetres closer, slightly right.\n\nSprint. Contact. Mandibles closed.\n\nA robber fly appeared — that aerial predator of beetles, built around the same principle: speed as the instrument. §N1§ dove into a crack in the sandy bank and waited in the cool dark.\n\nFour minutes.\n\nThe path was empty when he emerged.\n\n§N2§ was working the opposite edge, visible as a gleam of green in the afternoon light.\n\nGoodnight, tiger beetles. 🌙","cicada":"Seventeen years.\n\n§N1§ had been underground for seventeen years. Six feet down, in the dark, pressed against a tree root, drinking the slow trickle of fluid from the phloem through a beak designed for exactly this one purpose. Growing slowly. Moulting four times over seventeen years, each moult a larger version of the last. Waiting, though waiting implied awareness of time passing and §N1§ had no such awareness. He had a biological clock instead — something in his cells that counted, in a way that researchers had studied for decades without fully understanding, the cycles of seasons above a surface he had never seen.\n\nThe clock reached its end point on a morning in May.\n\nAll around him, under every piece of ground for miles, other cicadas were digging upward simultaneously. Not because they had communicated. Not because any one of them had decided. But because seventeen years of the same internal counting, run in parallel across millions of animals, reached the same conclusion at the same time. The ground across the eastern forest began to breathe — small holes opening everywhere at once, pale nymphs emerging into light they had never experienced, climbing the nearest vertical surface and splitting open the nymphal casing they had worn for seventeen years.\n\n§N1§ climbed a red maple, found a stable position, split, and pulled himself out of his old skin. His wings were pale and soft. They hardened in the morning air over the course of an hour. His colour deepened. He was no longer a nymph. He was a cicada.\n\nBy afternoon the males were calling. The tymbals in his abdomen — those ribbed membranes, one on each side, that clicked in and out thousands of times per second driven by powerful muscles — produced a sound that his body amplified through resonating chambers into something that reached a hundred decibels. The sound of a million cicadas calling simultaneously across the same forest was audible from half a mile away and unlike anything else in the natural world.\n\n§N2§ was on a nearby branch, listening. Female cicadas did not call. They chose.\n\nShe was listening to the quality of the calls around her — the volume, the rhythm, the consistency — making assessments that would determine which males she responded to. The males that called most consistently and most vigorously were the healthiest. Seventeen years of underground survival without getting eaten or diseased was itself a quality filter. Every cicada in this emergence had passed that test.\n\nA robin landed in the maple and took a cicada from a branch three feet away. A squirrel raced along the branches collecting them. A raccoon below was working through the fallen ones on the ground with the focused efficiency of an animal that had found something too abundant to waste. None of this mattered statistically. There were ten million cicadas per acre in this forest right now. The predators could eat until they were incapable of eating more, and it would not reduce the cicada population by a meaningful percentage. This was the plan. Prime numbers — thirteen or seventeen — ensured that no predator's population cycle could synchronise with the cicada's emergence. The mathematics of survival, evolved over millions of years.\n\n§N1§ called until the stars came out and then called into the darkness.\n\nGoodnight, cicadas. 🌙","stegosaurus":"§N1§ had seventeen plates along his back and two questions attached to them that scientists would still be arguing about a hundred and fifty million years later: were they for temperature regulation, display, or both — and why did the thagomizer have four spikes when three would have been sufficient?\n\nHe grazed the fern meadow with the plates warm from the sun, blood moving through them managing his temperature, the thagomizer hanging behind him like a slow pendulum.\n\nThe Allosaurus had a healed wound on its right shin from a previous encounter. It circled the meadow at thirty metres, more cautious than usual, maintaining the distance it had not maintained before.\n\n§N1§ tracked it with his body, turning slowly, keeping the thagomizer always facing the threat. The four spikes traced a three-metre arc.\n\nThe Allosaurus sat down in the grass.\n\nHe grazed. It watched. The Jurassic afternoon went on in its ancient way, neither animal changing its mind about anything.\n\n§N2§ appeared from the fern thicket and took position beside him, her own thagomizer adding its arc to his.\n\nGoodnight, Stegosaurus. 🌙","centipede":"The cave went dark immediately after the first bend. Not dim — dark. The complete, total darkness that existed in cave systems beyond the reach of any surface light, where eyes were useless regardless of how long you waited for them to adjust. §N1§ didn't need eyes for this. He had forty-two legs, each one carrying sensory cells that detected vibration, air pressure, and chemical information. He had two long antennae that tasted the air constantly, processing its chemistry into a map of everything nearby. And he had the forcipules — those modified front legs with their hollow, curved tips connected to venom glands — held forward and ready.\n\nHe moved along the cave ceiling. Upside down, at speed, all forty-two legs gripping the limestone with the matter-of-fact certainty of an animal for whom this was simply how ceilings worked. The legs moved in a coordinated wave from front to back, each one lifting and placing in sequence, the pattern so fluid it looked like something flowing rather than walking.\n\n§N2§ was somewhere in the lower passage. He could feel the faint vibrations of her movement transmitted through the rock — a different rhythm from the dripping water, the shifting air, the other inhabitants of the cave system.\n\nHe descended to the cave floor and moved through a side passage that smelled of cave crickets — those pale, long-legged insects that spent their whole lives underground, navigating the same absolute darkness he did, their antennae even longer relative to their bodies than his. He found one in a crack in the wall, the forcipules moving before the cricket had processed the contact. Venom delivered. He ate it methodically, rotating it in his front legs.\n\nThen he climbed back to the ceiling and positioned himself at the narrowest point of the main passage. This was what he came here for. Every evening, thousands of bats poured through this passage on their way to the surface — a river of small warm bodies and echolocation clicks, filling the passage from wall to wall and ceiling to floor. He hung from the ceiling by his back legs and waited, his front end dangling down into the stream of bat bodies that would begin in twenty minutes.\n\nThe bats came. That rushing, papery sound, the high-frequency clicks bouncing off every surface. §N1§ felt the air movement, the pressure waves of bodies passing, and his front end snapped out. The bat was small and its echolocation hadn't identified the dangling centipede as a threat because nothing in the bat's evolutionary history had prepared it for a predator hanging from the ceiling.\n\nHe retreated into a ceiling crevice with his catch.\n\nThis was the thing that made giant centipedes remarkable — not just that they were fast and venomous and armoured with forty-two legs, but that they had worked out how to hunt the sky from the ceiling. Most animals looked outward to hunt. He looked down at the sky that passed below him.\n\nGoodnight, centipedes. 🌙","daddy_long_legs":"§N1§ was not a spider. He produced no silk, had no venom, built no web. He was a harvestman — a completely separate group that had been navigating the world for four hundred million years through entirely different means.\n\nHis means: eight eyes on a tiny turret, eight legs roughly eight times the length needed for locomotion, sensory palps tasting the air. He was a tiny body in the centre of a very large sensory net.\n\nHe found the dead woodlouse by smell and ate it on the wall surface. He found fungus on the rotting board below and ate some of that too.\n\nThe frog appeared on the path.\n\nHe detached his right middle leg.\n\nThis was voluntary — a specific joint that could be released deliberately, the leg continuing to twitch through residual nerve impulses. The frog's attention went to the twitching leg. §N1§ moved away on seven legs, which was enough.\n\nThe frog ate the leg.\n\n§N1§ found the wall's sheltered gap and pressed inside.\n\n§N2§ was in the adjacent gap, those long legs folded around her small body.\n\nGoodnight, daddy long legs. 🌙","tasmanian_devil":"§N1§ heard the carcass from almost a kilometre.\n\nNot smelled — the wind was wrong for smell tonight, coming from the south and carrying nothing useful. He heard it: the specific combination of sounds that a large dead animal produced in the Tasmanian bush at night. The flies — even in cool weather there were flies within hours. The ravens shifting in the trees above. The subtle sounds of a large object settling as gases moved through it. §N1§'s hearing was extraordinary for his size, and he had spent three years learning to read this particular acoustic landscape.\n\nHe was already moving at his distance-eating trot — that rolling, front-heavy gait that could sustain sixteen kilometres per hour for hours — when the smell arrived on a shift in the wind. Confirmed. Wallaby, he thought, or something close to it. Dead at least a day.\n\nHe arrived to find three other devils already there, and the scene was exactly what it always was: chaos performed at high volume.\n\nTwo animals were screaming at each other across the carcass in the way that Tasmanian devils screamed — that sound that people who heard it for the first time in the dark bush genuinely found alarming, a shriek and a yowl combined, pitched to carry through dense scrub, serving as both threat and negotiation. The third devil was already eating, having apparently decided that while the other two performed their vocal argument, the food was available.\n\n§N1§ joined the screaming economy. His ears flushed red — those blood-vessel-rich ear surfaces that heated visibly with exertion and arousal, one of the devil's stranger features. He opened his jaws to their full gape — that extraordinary forty-five-degree opening, the widest of any carnivorous mammal — and screamed at the nearest animal.\n\nThe nearest animal screamed back. They assessed each other. §N1§ was in good condition and his gape was convincing.\n\nThe other devil moved to the far side of the carcass.\n\nHe ate completely, which was the only way Tasmanian devils ate. The jaws that could generate fifteen hundred pounds per square inch of bite force — the strongest relative to body size of any mammal on Earth — made short work of bones that other carnivores left. Hide. Bones. Hooves. Everything that could be consumed was consumed. A Tasmanian devil left almost nothing behind, which was not greed but function: he was the bush's cleanup system, the organism that closed the loop on death and returned it to soil.\n\n§N2§ appeared from the scrub when the screaming had reduced to a negotiable level and ate from the end that the other devils had left available.\n\nBy the time the eastern sky began to show grey, the carcass was bones and a stain in the soil.\n\n§N1§ found a hollow log fifty metres away and pressed inside, full in a way that felt structural rather than pleasant, and slept with the deep commitment of an animal whose work was done.\n\nGoodnight, Tasmanian devils. 🌙","cockroach":"§N1§ moved through the Madagascar forest floor with the efficiency of an animal that had been doing this, in essentially the same way, for three hundred and twenty million years.\n\nThe cockroach body plan had remained stable through five mass extinctions, through the dinosaurs, through the asteroid that ended the Cretaceous, through the long recovery after it. When the dinosaurs were gone and the mammals were diversifying, the cockroaches were in the leaf litter doing exactly what they had been doing before. They had gotten it right early and seen no reason to change it.\n\n§N1§ found the fallen fig by smell and fed steadily, processing the fermenting pulp and the fungi growing through it. Both were food. Nothing was wasted.\n\n§N2§ appeared from behind a root and they exchanged antennal contact — species recognition, health assessment, all of it in three seconds. Then both went back to eating.\n\nThe gecko dropped from the root above.\n\n§N1§ hissed — that sound produced by forcing air through the breathing pores along his abdomen, surprisingly loud and startling. The gecko flinched. In that moment §N1§ moved under the leaf litter.\n\nThe gecko found a different meal.\n\nHe emerged and resumed eating. Dead things becoming soil, soil becoming roots, roots becoming trees. He was part of every step.\n\nGoodnight, hissing cockroaches. 🌙","tarantula":"§N1§ came out of his burrow after dark, which was when he always came out, and stood at the entrance for a full minute before moving further.\n\nThe burrow was lined with silk — not for catching prey but for sensing it. Every vibration that crossed the silk mat at the entrance was conducted directly to his legs, which were themselves sensory instruments of extraordinary sensitivity. Something the size of a mouse, moving through the leaf litter ten metres away, produced vibrations that arrived at his feet as clear information: size, speed, direction, distance. He processed all of it before committing to the open forest floor.\n\nThe forest floor seemed quiet. He moved out.\n\n§N1§ was twelve inches across from leg-tip to leg-tip. His fangs were an inch long. He was the largest spider in the world, and he moved with the slow, deliberate confidence of something that had very little to run from. The deliberateness was not caution — it was precision. Every leg placement was intentional. Every pause was information-gathering.\n\n§N2§ was north of the burrow, her slower movements detectable through the vibrations in the forest floor, a different signature from anything else in the area. They were not hunting together — tarantulas were solitary — but they were aware of each other in the way of animals whose whole existence was built around detecting the movement of others.\n\nHe tracked the mouse for four minutes before it came within range.\n\nThe mouse was moving through the leaf litter in the specific foraging pattern of an animal focused on finding seeds — stopping, investigating, moving on, stopping again. It had no mechanism for detecting a still tarantula. §N1§'s legs didn't move. His abdomen didn't move. He was simply a feature of the forest floor — a large, dark, slightly irregular object among other large, dark, slightly irregular objects — and the mouse's brain had not evolved to distinguish him from them.\n\nAt striking range, both fangs drove downward simultaneously. The mouse's nervous system produced an alarm response that arrived approximately one second after the venom had already begun its work. §N1§ held the mouse with his front legs while the venom completed what the strike had started.\n\nHe was dragging it toward the burrow when the tarantula hawk wasp appeared.\n\nThat orange-winged, blue-black body, that specific hovering search pattern that tarantula hawks used when they were looking for exactly what §N1§ was. These wasps were purpose-built to hunt tarantulas — their stinger delivered a venom rated as one of the most painful insect stings in the world, capable of completely paralysing a tarantula within seconds. The paralysed spider would then be sealed in a burrow with the wasp's egg, to be eaten alive over the following weeks by the hatching larva.\n\n§N1§ dropped the mouse and reared up.\n\nBoth his back legs swept across his abdomen, flicking a cloud of urticating hairs — those barbed, microscopic needles embedded in his rear, launched by a friction motion, drifting toward the wasp on the air movement between them. The hairs embedded in the wasp's eyes and mouthparts. The irritation was immediate and intense. The wasp veered away, already rubbing its face against a nearby leaf, trying to dislodge the invisible needles.\n\n§N1§ picked up the mouse and moved quickly to the burrow entrance, backing in with his catch.\n\nDeep in the burrow, the silk walls transmitted the sounds of the rainforest — the frogs beginning their evening chorus, the distant crash of something large in the undergrowth, the wasp still working at the leaf outside. He ate in the dark, the forest floor safe and quiet around him, and the silk told him everything.\n\nGoodnight, tarantulas. 🌙","quokka":"The scrub on the island's eastern side was dark and cool after the heat of the day, smelling of sea salt and dry grass and the particular dusty warmth of Australian bush at night. §N1§ emerged from the thicket where he had been sheltering through the afternoon and sat upright for a moment at the scrub's edge, those round ears rotating, that expression that tourists photographed endlessly and that scientists carefully noted was simply his resting face, not a reflection of any emotional state that could be meaningfully described as happiness.\n\nHe was, however, well.\n\nRottnest Island had no foxes anymore — the eradication program had worked — and the cats that had once been a problem had been managed to very low numbers. The main predators for quokkas here were the raptors, and raptors hunted by day. The night belonged to §N1§ and the other two thousand quokkas on the island, which was enough quokkas for a place this size and everyone knew it.\n\nHe moved to the grass patch he had been using all week — a section of native grass that had come up fresh after the last rain and was still green and tender at its base where the soil held moisture longest. He sat and fed in the quokka manner: sitting back on his haunches like a small kangaroo, front paws holding stems, teeth working through the base where the sugars and moisture were concentrated.\n\nA fox, if there had been a fox, would have been a problem. Without foxes, the night was uncomplicated.\n\nHe was three weeks old when the island got him. Before that he had been on the mainland, where foxes were everywhere and quokkas barely existed outside the scattered patches of dense scrub that offered some protection. On the mainland, being a small marsupial was a complicated and often brief condition. Here, it was fine.\n\n§N2§ appeared from the adjacent thicket with her joey's nose visible at the pouch, those enormous eyes reflecting the moonlight. They grazed near each other without any particular interaction — quokkas were not strongly social in the way of some marsupials, but they were not solitary either, and the presence of other quokkas in visible range was a comfort that operated below the level of conscious attention.\n\nA quail called from the grass twenty metres away, startling them both into momentary stillness. Then nothing. The night resumed.\n\nHe found a fig that had fallen from the small tree at the scrub's edge and ate it where it lay, the sweetness of it something he had no words for but his tongue knew precisely.\n\n§N2§ moved into the scrub.\n\nThe island was quiet. The Southern Ocean was audible at the island's edge, constant and far.\n\nGoodnight, quokkas. 🌙","kiwi":"§N1§ pushed his bill into the soil and inhaled.\n\nThe nostrils at the very tip of his bill — the only bird nostrils positioned here, at the end rather than the base — were pressed directly against the earth, reading its chemistry the way other animals read air. Worm chemistry. The specific proteins and gases that a large earthworm produced as it moved through the soil at depth. He rotated the bill slightly, triangulating.\n\nHe probed. The bill went in to its full length — four inches — and the flexible tip felt the tunnel the worm had made. He adjusted the angle and extracted the worm with a single practiced pull.\n\nKiwis had evolved to do something no other bird did: hunt by smell, underground, in total darkness, without using their eyes at all. Their eyes were small and functionally poor — nearly useless for the nocturnal forest hunting they did. Their ears were large and helped. But the nose was the instrument. A kiwi's olfactory system was among the most developed of any bird, its brain allocating more space to smell processing than to vision processing, which was the inverse of almost every other bird's brain and reflected the specific demands of this specific ecological niche.\n\n§N2§ called from the far side of the path — that piercing, repeated call that carried through the dark New Zealand bush. He answered with the lower, rougher call that was his voice, and they stayed connected through sound while working different sections of the forest floor.\n\nA stoat had been through the path recently — he detected the scent and went still. Stoats were the great killer of kiwis in modern New Zealand, introduced mammals moving through the bush with a stealth and speed that kiwis had not evolved to deal with. He held completely still while he read the scent for recency and direction. Old. Moving east. He continued west.\n\nThe ground beneath the old podocarp tree was particularly productive — the soil there was deep and loose and moist and full of the invertebrate life that deep, loose, moist soil supported. He worked through it methodically, the bill going in at different angles, extracting worms and huhu grubs with the practiced efficiency of an animal that had done this every night of his adult life.\n\nA morepork owl called twice from the canopy above — that haunting, repeated note that gave it its Maori name. Weta insects clattered in the branches. The bush was doing what New Zealand bush did: being full of strange life in the dark, the remnant of an island that had been cut off from every large predator for eighty million years and had filled its ecological space with birds, including the impossible bird at its centre, the one that smelled its way through the dark earth and sang to its mate across the trees.\n\nHe found §N2§ by following her call to its source, and they moved together through the same section of forest floor for an hour, their bills both working the soil, the bush quiet around them.\n\nGoodnight, kiwis. 🌙","thorny_devil":"§N1§ stood at the edge of his favourite spinifex clump as the first light touched the desert and did what thorny devils did first every morning: drank.\n\nNot from any water source — there was no water source for twenty kilometres. He drank from the air itself, or more precisely from what the air had left on his skin overnight. The desert had cooled to near-freezing while he sheltered, and the moisture in the cool air had condensed on his spines — thirty-three conical thorns, each one a spine, each one connected to the next by microscopic grooves in his skin that ran between every scale. The condensed water followed these grooves by capillary action — that same force that made water climb through narrow tubes — running from spine to spine, scale to scale, in a slow invisible river that flowed toward his mouth without any pumping required.\n\nHe stood in the early light and was watered by physics.\n\nWhen his internal water balance reached acceptable levels, he walked. His walk was the distinctive thorny devil walk: stopping every few steps and rocking back and forth, then moving again. The rocking had no clear explanation in the scientific literature, though suggestions included camouflage — a moving lizard that also rocked looked more like a leaf in wind and less like something worth chasing — and balance-checking. §N1§ simply walked as he walked, which was the only way he knew.\n\nHe found the ant trail before his second rest stop.\n\nThe ants were small and black and numerous, moving in the highway between two spinifex clumps that he had been using for eleven days. He positioned himself beside the trail and his tongue began its work — extending, contacting, retracting. Not sweeping. One ant per extension. The tongue found one ant, returned, found another, returned. Over and over, at a rate of roughly forty ants per minute.\n\nHe ate for two hours.\n\nDuring this time a goanna appeared at the scrub's edge and assessed him. §N1§ lowered his actual head until it was tucked against his chest and the lump of fat and skin on the back of his neck — shaped, in a remarkable evolutionary coincidence, exactly like a head — presented itself as the highest point of his profile. He sat still. The goanna read the spines and the apparent head. It moved on.\n\nHe raised his real head when the goanna's chemical trace had faded and returned to the ants.\n\n§N2§ appeared from behind the adjacent rock — her approach silent on the soft sand, her own movement that characteristic rocking stop-start. She found a different section of the same ant trail and positioned herself alongside it without approaching close enough to disturb his feeding.\n\nThe desert warmed steadily around them.\n\nBy the time the temperature reached the level where lizards needed shade, he had eaten four thousand two hundred and seventeen ants. He found the shadow of the large rock and pressed himself into it, his skin already beginning its colour change toward the rock's specific shade of ochre-brown.\n\nA mulga snake appeared on the sand between him and the ant trail — that thick-bodied, venomous snake, one of the few predators willing to attempt a thorny devil. §N1§ froze, lowered his real head, and presented the false head on his neck — that lump of fat and skin shaped like a head from behind. The snake investigated the spines from three angles, found nothing accessible, and continued south across the flat.\n\nGoodnight, thorny devils. 🌙","fruit_fly":"The peach had been fermenting for three days and §N1§ had known about it for most of that time.\n\nHe had detected the ethanol plume from forty metres — that specific chemical signature of yeast breaking down fruit sugars, the smell that fruit flies had evolved to track with the precision of a guided missile. His antennae had locked onto the gradient, the concentration increasing with every metre, and he had flown the chemical corridor from the rosebush at the garden's edge to the fallen peach in a straight committed line that took eleven seconds.\n\nHe was not the first one there. A hundred fruit flies were already working the split skin of the peach, their mouthparts processing the fermenting juice, their egg-laying tubes already probing for the right depth of warm, yeast-rich flesh. §N1§ landed and joined them without any of the territorial behaviour that larger animals might have shown. The peach was large enough. There was no scarcity here.\n\nHe tasted the fruit through the chemoreceptors on his feet — landing and tasting in the same moment, the way fruit flies always did. Good yeast. Good sugar concentration. He fed steadily.\n\nHis compound eyes covered most of his head and processed the world at a frame rate ten times faster than human eyes — what appeared as a smooth, continuous world to a human was, to him, a series of sharp, distinct images arriving in rapid succession. The spider that appeared at the peach's edge was moving, and he was aware of every individual moment of its movement as it crossed the skin toward him.\n\nHe was airborne before it arrived. The calculation had been instantaneous, his wings beating two hundred times per second, his body rotating away in a direction the spider hadn't predicted because his escape response randomised direction.\n\nHe landed on the other side of the peach.\n\n§N2§ had been here longer than him — she was already laying eggs into the fruit's interior, placing each one with careful precision into the depth where the temperature and yeast content were exactly right. She would lay five hundred eggs in her lifetime and she was working through that number with the focused commitment of an animal whose entire existence was oriented around this one project.\n\nA parasitic wasp appeared above the peach — that small, precise hunter that sought out fruit flies specifically to inject its own eggs inside them. §N1§ detected the change in the air pressure above him and launched again, spiralling upward in an evasive pattern that his nervous system produced without any deliberate thought. He landed in the grass ten centimetres away and went still.\n\nThe wasp investigated the peach, found §N2§ distracted mid-lay, and moved toward her.\n\nShe launched. The wasp tracked her. She zagged — that randomised direction change that made fruit flies so difficult to catch even for predators specifically evolved to catch them — and the wasp lost her trajectory.\n\nThey reconvened on the peach when the wasp had moved to other hunting grounds.\n\nBy morning §N1§ had fed enough to fuel three days of flight, and §N2§ had laid sixty eggs into the warm fermenting flesh. In twenty-four hours, those eggs would hatch. In ten days, they would be adult fruit flies, ready to find the next fermenting thing.\n\nSomewhere in a university laboratory, their cousins were being studied under microscopes. Fruit flies had told scientists more about genetics, disease and ageing than almost any other creature on Earth. §N1§ knew nothing about this. He returned to the peach.\n\nGoodnight, fruit flies. 🌙","wasp":"The nest had taken §N1§ and her sisters three weeks to build, and it was extraordinary.\n\nShe had started it alone in early spring — chewing weathered fence wood into a paste with her mandibles and saliva, carrying the grey pulp to the nest site under the garden eave, pressing it into layers that dried into cells as strong as cardboard. By the time the first workers hatched from the first cells, the nest was the size of a golf ball. Now, with sixty workers, it was the size of a grapefruit and growing.\n\n§N1§ launched from the nest entrance on a hunting sortie, her yellow and black banding catching the morning light. The banding was a warning that the whole garden had learned to read: approach with caution, retreat quickly.\n\nShe found the caterpillar on the brassica leaf — a large cabbage white, fat and green and completely unaware of what was descending toward it. She stung it once to paralyse it, then used her mandibles to cut it into a package small enough to carry. The paralysed caterpillar would be fed to the larvae back at the nest, who would reward the adults with a droplet of sweet saliva in return — the colony's internal economy, protein traded for sugar, keeping both the adults and the young fed.\n\nA bee-eater bird appeared on the fence post above the vegetable bed, watching her with specific attention. These birds were the wasp's genuine aerial threat — immune to stings, fast enough to catch wasps in flight, skilled at removing the stinger before swallowing. §N1§ flew low along the bed and into the dense bean foliage where the bird couldn't easily dive.\n\nShe waited three minutes, then took a different route back to the nest.\n\n§N2§ was at the nest entrance when she returned, performing the guard role — checking each returning wasp's chemical identity against the colony's shared scent before allowing entry. A buff-tailed bumblebee had blundered into the nest's airspace by accident, and §N2§ had driven it away with aggressive flight displays before it came close enough to require stinging.\n\nInside the nest the larvae were in their cells, heads extending when they detected the vibration of returning foragers, already anticipating the protein packages coming their way. The queen was deeper in the nest, laying eggs that would become the next generation of workers.\n\n§N1§ delivered her caterpillar. The larva that received it was the size of a grain of rice and it ate with a focused intensity that its small size made comical.\n\nShe launched again. There were more caterpillars. The garden's brassicas had never been so well-protected.\n\nAt dusk, when the temperature dropped below the threshold the wasps used to trigger rest, the colony settled. The nest hummed faintly with the body heat of sixty animals pressed together in their grey paper city.\n\nGoodnight, paper wasps. 🌙","firefly":"§N1§ turned on his light.\n\nIt was the chemical reaction in his abdomen — luciferin oxidising in the presence of the enzyme luciferase, releasing energy almost entirely as light, almost none as heat. The most efficient light production in the natural world. A single pulse, yellow-green, lasting half a second, every five and a half seconds. His specific pattern. His species' code. His identity broadcast into the summer darkness of the meadow.\n\nHe was flying low over the grass, following the irregular path that advertising males flew, his flash pattern going out and waiting for the answer that would tell him a female had seen him and was interested.\n\nThe meadow in July was full of flashes. Three species shared this field and each had a different pulse pattern — different duration, different interval, different number of flashes per sequence — and the females of each species responded only to their own species' code. §N1§ flew and flashed and waited. Flew and flashed and waited. The other species' flashes went by like unaddressed letters.\n\nThen from the grass below: a single flash, two seconds after his. Exactly two seconds. That was the response interval of his species' females.\n\nHe turned toward it and flashed again. The response came back in two seconds. He descended.\n\n§N2§ was on a grass stem below him, her own light organ active. She had been watching the aerial display for twenty minutes, assessing the quality of several males — the brightness of the flash, the precision of the timing, the steadiness of the flight — before choosing to respond to §N1§. She had been selective. Firefly females always were.\n\nA crab spider was on the same grass stem, motionless and perfectly camouflaged, waiting. It had learned that firefly flash responses attracted males. It waited at response sites for exactly this.\n\n§N2§ detected the spider's vibration on the stem and launched before it could strike. She flashed twice in quick succession — a distress signal that §N1§ read as: not here, somewhere else — and he followed her light to a different stem five metres away.\n\nThe spider sat on its stem and waited for the next response.\n\nThey found a clear stem in the longer grass at the meadow's edge, away from the paths the spiders favoured. The night was warm and the meadow was full of light — hundreds of fireflies, each one a brief yellow-green star appearing and disappearing, the whole meadow flickering like a sky that had fallen into the grass.\n\nA toad sat at the meadow's edge, catching fireflies with its sticky tongue at irregular intervals. It had been doing this for an hour. The fireflies contained defensive chemicals — lucibufagins — that made them taste terrible to most predators. The toad had apparently decided this was acceptable.\n\n§N1§ and §N2§ were not near the toad. They were in the long grass, their lights going on and off in the dark, their conversation in flashes continuing into the warm summer night.\n\nAbove the meadow, bats were hunting moths. The bats could see the firefly flashes — those bright, brief pulses were completely visible to echolocating mammals — but had learned over generations that fireflies tasted as terrible as the toad had recently discovered.\n\nThe meadow pulsed and flickered. The warm night held everything.\n\nGoodnight, fireflies. 🌙","elephant":"§N1§ walked in front, as she had for thirty years.\n\nThe herd moved behind her in the loose, undulating way of a family that had been moving together for decades — aunts and nieces and daughters and the three youngest calves, who stayed close to their mothers' legs when they were tired and wandered a little when they weren't. Eleven animals in total. §N1§ knew each of them by scent and by voice and by the specific way each one's footfalls felt through the ground, transmitted up through her feet in the low-frequency vibrations that elephants used to communicate across kilometres of savanna.\n\nShe was the matriarch. She had been the matriarch since the old matriarch before her — her own mother — had died during the drought twelve years ago, and she had taken the role with the confidence of an animal that had spent forty years accumulating the knowledge that the role required.\n\nShe knew where the water was.\n\nNot from smell, though she could smell water from twenty kilometres in the right conditions. Not from memory alone, though her memory was extraordinary and she carried maps of every waterhole within a hundred kilometres of her birth area. She knew where the water was the way someone knows the layout of their own house in the dark — from the integration of a thousand small pieces of information, assembled into certainty.\n\nThe dry season had been hard. The waterhole they had used last year had failed in August. She had led the herd forty kilometres north to the backup source she had used once before, fifteen years ago, in another drought year. The route was still in her. The turns were still in her. She had led the herd there without hesitation and it had been there, smaller than before but there.\n\nNow she was leading them home.\n\nThe young bull calf — eight months old, still learning what his trunk was for — had been playing with a fallen acacia branch for the last twenty minutes, carrying it, dropping it, carrying it again, and periodically hurrying to catch up with his mother when the gap grew too large. §N1§ had been monitoring the gap with one ear while keeping her attention on the direction of travel. The calf was fine. He always caught up.\n\nA family of zebras crossed their path ahead — that striped herd, moving with their own sense of purpose, the two species passing through each other's space with the practiced ease of animals that had been doing this for a million years. Elephants and zebras had nothing to fight over. The zebras gave way as a courtesy, not a requirement.\n\nThe sunset was behind them, turning the dust they raised to gold.\n\n§N2§ moved up to walk alongside §N1§ in the late afternoon — her sister, the second oldest female, who sometimes walked beside her as if the proximity of one long relationship was its own kind of navigation.\n\nThey walked together as the light failed.\n\nGoodnight, elephants. 🌙","lemur":"The troop's morning ritual began before full light, and §N1§ was always first.\n\nShe climbed to the exposed branch on the tallest tree at the forest edge — the branch she used every morning, the one that caught the first direct sun — and sat upright, arms spread wide, the dark skin of her belly and inner arms turned toward the east. The body temperature of a ring-tailed lemur dropped overnight, and the sun was the most efficient solution to this: press the most heat-absorbing surface toward the heat source and wait. The troop did this together every morning, a dozen lemurs on various branches in various stages of sunbathing, the social animals and the heat-requiring physiology perfectly aligned in one behaviour.\n\n§N2§ was on the branch below, doing the same thing.\n\nWhen she was warm enough §N1§ led the troop into the tamarind grove that had been fruiting for ten days and would not fruit for another eight months. Ring-tailed lemur troops moved together through territories that contained multiple food sources, the matriarch — the dominant female, which was always the matriarch, because ring-tailed lemur society was built around female dominance — choosing the route and the destinations.\n\nShe had been making these choices for six years.\n\nThe troop spread through the tamarind trees and fed, the contact calls going back and forth — that series of meows and yaps and clicking sounds that kept the troop connected when they couldn't see each other through the foliage. §N1§ monitored the calls passively, aware of each animal's position by voice, alert to the changes in call pattern that would indicate alarm.\n\nThe fossa scent on the boundary tree was two hours old.\n\nShe tracked it in her head: the fossa had been moving north along the forest edge, had crossed their territory at the northern point, had continued north. It was not in the grove now. She fed, but with a specific quality of alertness that was different from the relaxed feeding she allowed the troop in the centre of the territory far from the boundary.\n\nHer alarm call, when she gave it, sent every lemur to the highest branches in under five seconds.\n\nBut it was not a fossa. It was another ring-tailed lemur — a male from the adjacent troop, young, testing the boundary. She watched him from above. The troop watched him from above. He looked up at eleven lemurs looking down at him from a tamarind tree and made the assessment that young boundary-testing males always had to make.\n\nHe retreated.\n\n§N1§ descended first, as always, and resumed eating.\n\nGoodnight, ring-tailed lemurs. 🌙","velociraptor":"§N1§ had feathers, and this was important to understand before anything else about him.\n\nReal feathers — quill knobs in his forearm bones, preserved in the fossil record, identical to the anchor points in modern bird wings. He couldn't fly. His arms were too small and his body too heavy for powered flight, and the feathers served other purposes: insulation, display, possibly helping him balance during high-speed turns. But the feathers connected him to something — or rather, they connected something to him. The birds that would one day inherit the Earth were his evolutionary descendants, and when you looked at him correctly, you could see the bird underneath the predator.\n\nHe was moving through Mongolian scrubland on a hunt, and §N2§ was thirty metres to his right, moving parallel.\n\nThe Velociraptor was the size of a turkey. The movies had given him a different size, inflating him to man-height for dramatic purposes, because the real animal's size made it harder to be frightened of. But the real animal, seen in full: quick, intelligent, feathered, with those large forward-facing eyes that gave it binocular vision and genuine depth perception, and that sickle claw held off the ground to keep it sharp — the real animal was something you would not want to encounter in Mongolian scrubland eighty million years ago.\n\nThe Protoceratops was larger than him. Most of his prey was larger than him.\n\nHe hunted the way that small, clever predators had always hunted large prey: by being faster, by being smarter about position, by using a partner. §N2§ was moving to flank the Protoceratops from the right while he approached from the left, and neither of them had communicated this plan in any way that a human observer would have recognised as communication. They had hunted together enough times that the plan was already known.\n\nA fossil existed — one of the most famous fossils in paleontology — of a Velociraptor and a Protoceratops preserved together, locked in combat, buried alive by a collapsing dune, the fight frozen at the moment of mutual harm. §N1§ knew nothing about this fossil. He knew about the sand.\n\nWhen the dune collapsed he was already running.\n\n§N2§ ran beside him.\n\nThey found shelter in a rock overhang as the sandstorm built, pressed together in the small dry space, waiting with the patience of small animals in large storms.\n\nThe Mongolian desert howled outside.\n\nGoodnight, Velociraptors. 🌙"};
const C=CORE.categories;
const A=CORE.animals;
const S=STORIES;

function gc(k){ return C.find(function(c){ return c.key===k; }); }
function ga(c){ return Object.keys(A).filter(function(k){ return A[k].category===c; }).map(function(k){ var a=A[k]; a.key=k; return a; }); }

function getStory(k,n1,n2){
  var t = S[k] || "Goodnight. \uD83C\uDF19";
  return t.split("\u00A7N1\u00A7").join(n1).split("\u00A7N2\u00A7").join(n2);
}

function makeChunks(t){
  var sents=[]; var cur="";
  for(var i=0;i<t.length;i++){
    cur+=t[i];
    if((t[i]==="."||t[i]==="!"||t[i]==="?")&&cur.trim().length>20){
      sents.push(cur.trim()); cur="";
    }
  }
  if(cur.trim()) sents.push(cur.trim());
  if(!sents.length) return [t];
  var n=Math.min(7,sents.length);
  var z=Math.ceil(sents.length/n);
  var out=[];
  for(var i=0;i<sents.length;i+=z) out.push(sents.slice(i,i+z).join(" "));
  return out;
}

function getRead(){ try{ return JSON.parse(localStorage.getItem("read")||"{}"); }catch(e){ return {}; } }
function markRead(k){ try{ var r=getRead(); r[k]=true; localStorage.setItem("read",JSON.stringify(r)); }catch(e){} }

// State
var st = { pg:"home", cat:null, ak:null, n1:"Carson", n2:"Avery", cks:[], idx:0, typed:"", typing:false, tm:null };
var voiceOn = false;

function setState(p){ Object.assign(st,p); render(); }

// Navigation - use data attributes on buttons, attach listeners after render
function render(){
  var el = document.getElementById("app");
  var ci = st.cat ? gc(st.cat) : null;
  var an = st.ak ? A[st.ak] : null;
  var bg = an ? an.bg : ci ? ci.bg : "#010b14";
  document.body.style.background = bg;

  if(st.pg==="home"){ renderHome(el); return; }
  if(st.pg==="cat" && ci){ renderCat(el,ci); return; }
  if(st.pg==="info" && an){ renderInfo(el,an,ci); return; }
  if(st.pg==="story" && an){ renderStory(el,an); return; }
}

function el(tag,attrs,inner){
  var s="<"+tag;
  for(var k in attrs) s+=" "+k+"=\""+attrs[k].toString().replace(/"/g,"&quot;")+"\"";
  return s+">"+inner+"</"+tag+">";
}

function btn(label,color,full){
  return "<button class=\"abtn\" data-color=\""+color+"\" style=\"width:"+(full?"100%":"auto")+";display:block;margin-bottom:8px;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+color+"33,"+color+"55);border:1px solid "+color+"77\">"+label+"</button>";
}

function renderHome(el){
  var html = "<div class=\"s\"><div style=\"text-align:center;padding:24px 0 18px\"><div style=\"font-size:48px\">🌙</div><h1 style=\"font-size:20px;margin:8px 0 4px\">Bedtime Animal Adventures</h1><p style=\"color:rgba(255,255,255,.45);font-size:13px\">Choose a habitat</p></div><div class=\"g3\">";
  C.forEach(function(c){
    html += "<button class=\"catbtn\" data-cat=\""+c.key+"\" style=\"background:linear-gradient(135deg,"+c.color+"0a,"+c.color+"20);border:1px solid "+c.color+"44;border-radius:12px;padding:10px 4px;text-align:center;width:100%\"><div style=\"font-size:22px\">"+c.emoji+"</div><div style=\"font-size:9px;color:"+c.color+";font-weight:bold;margin-top:3px;line-height:1.2\">"+c.label+"</div><div style=\"font-size:8px;color:rgba(255,255,255,.3);margin-top:2px\">"+ga(c.key).length+"</div></button>";
  });
  html += "</div></div>";
  el.innerHTML = html;
  el.querySelectorAll(".catbtn").forEach(function(b){
    b.addEventListener("click", function(){ setState({pg:"cat",cat:this.dataset.cat}); });
  });
}

function renderCat(el,ci){
  var read = getRead();
  var html = "<div class=\"s\"><button class=\"back homebtn\">← Back</button><div style=\"text-align:center;margin-bottom:18px\"><div style=\"font-size:38px\">"+ci.emoji+"</div><h2 style=\"color:"+ci.color+";margin:6px 0\">"+ci.label+"</h2><p style=\"color:rgba(255,255,255,.4);font-size:13px\">"+ci.desc+"</p></div><div class=\"g2\">";
  ga(st.cat).forEach(function(a){
    var done = read[a.key];
    html += "<button class=\"anbtn\" data-key=\""+a.key+"\" style=\"background:linear-gradient(135deg,"+a.accent+(done?"44":"0a")+","+a.accent+(done?"66":"20")+");border:"+(done?"2":"1")+"px solid "+a.accent+(done?"99":"44")+";border-radius:12px;padding:14px 8px;text-align:center;position:relative\">"+(done?"<div style=\"position:absolute;top:5px;right:7px;font-size:12px\">✅</div>":"")+"<div style=\"font-size:30px\">"+a.emoji+"</div><div style=\"font-size:12px;color:"+a.accent+";font-weight:bold;margin-top:5px\">"+a.name+"</div></button>";
  });
  html += "</div></div>";
  el.innerHTML = html;
  el.querySelector(".homebtn").addEventListener("click", function(){ setState({pg:"home",cat:null,ak:null}); });
  el.querySelectorAll(".anbtn").forEach(function(b){
    var pressTimer = null;
    b.addEventListener("click", function(){ setState({pg:"info",ak:this.dataset.key}); });
    b.addEventListener("mousedown", function(){
      var key = this.dataset.key;
      pressTimer = setTimeout(function(){
        pressTimer = null;
        var r = getRead();
        if(r[key]){ delete r[key]; } else { r[key] = true; }
        try{ localStorage.setItem("read", JSON.stringify(r)); }catch(e){}
        setState({pg:"cat"});
      }, 600);
    });
    b.addEventListener("mouseup", function(){ clearTimeout(pressTimer); });
    b.addEventListener("mouseleave", function(){ clearTimeout(pressTimer); });
    b.addEventListener("touchstart", function(e){
      var key = this.dataset.key;
      var self = this;
      pressTimer = setTimeout(function(){
        pressTimer = null;
        var r = getRead();
        if(r[key]){ delete r[key]; } else { r[key] = true; }
        try{ localStorage.setItem("read", JSON.stringify(r)); }catch(e){}
        // vibrate if supported
        if(navigator.vibrate) navigator.vibrate(50);
        setState({pg:"cat"});
      }, 600);
    }, {passive:false});
    b.addEventListener("touchend", function(e){
      if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; }
      else { e.preventDefault(); }
    });
    b.addEventListener("touchmove", function(){ clearTimeout(pressTimer); pressTimer=null; });
    b.addEventListener("contextmenu", function(e){ e.preventDefault(); });
  });
}

function renderInfo(el,an,ci){
  var ac = an.accent;
  var imgurl = "https://www.google.com/search?q="+encodeURIComponent(an.name+" wildlife")+"&tbm=isch";
  var html = "<div class=\"s\">"
    +"<button class=\"back catbtn2\">← Back</button>"
    +"<a href=\""+imgurl+"\" target=\"_blank\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;border-radius:14px;margin-bottom:14px;text-decoration:none;background:linear-gradient(135deg,"+an.bg+","+ac+"22);border:1px solid "+ac+"55\">"
    +"<div style=\"font-size:72px\">"+an.emoji+"</div><div style=\"font-size:14px;color:"+ac+";font-weight:bold;margin-top:8px\">"+an.name+"</div><div style=\"font-size:11px;color:"+ac+";opacity:.6;margin-top:4px\">📷 tap for photos</div></a>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28;margin-bottom:10px\"><div style=\"font-size:10px;color:"+ac+";font-weight:bold;margin-bottom:6px;text-transform:uppercase\">🏠 Habitat</div><div style=\"font-size:13px;color:rgba(255,255,255,.8)\">"+an.habitatEmoji+" "+an.habitat+"</div></div>"
    +"<div class=\"g2\" style=\"margin-bottom:10px\">"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28\"><div style=\"font-size:10px;color:#f87171;font-weight:bold;margin-bottom:6px;text-transform:uppercase\">⚠️ Predators</div>"+an.predators.map(function(p){ return "<div style=\"font-size:12px;color:rgba(255,255,255,.7);padding:2px 0\">"+p+"</div>"; }).join("")+"</div>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28\"><div style=\"font-size:10px;color:#4ade80;font-weight:bold;margin-bottom:6px;text-transform:uppercase\">🍖 Prey</div>"+an.prey.map(function(p){ return "<div style=\"font-size:12px;color:rgba(255,255,255,.7);padding:2px 0\">"+p+"</div>"; }).join("")+"</div>"
    +"</div>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28;margin-bottom:10px\"><div style=\"font-size:10px;color:"+ac+";font-weight:bold;margin-bottom:8px;text-transform:uppercase\">✨ Amazing Facts</div>"+an.facts.map(function(f){ return "<div style=\"font-size:13px;color:rgba(255,255,255,.8);padding:3px 0\">"+f+"</div>"; }).join("")+"</div>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28;margin-bottom:14px\"><div style=\"font-size:10px;color:"+ac+";font-weight:bold;margin-bottom:8px;text-transform:uppercase\">Name Your Adventurers</div>"
    +"<div class=\"g2\"><input id=\"n1\" placeholder=\"Carson\" value=\""+st.n1+"\" style=\"background:rgba(255,255,255,.07);border:1px solid "+ac+"44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%\">"
    +"<input id=\"n2\" placeholder=\"Avery\" value=\""+st.n2+"\" style=\"background:rgba(255,255,255,.07);border:1px solid "+ac+"44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%\"></div></div>"
    +"<button class=\"beginbtn\" style=\"width:100%;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77;border-radius:12px;padding:14px;color:#fff;font-size:16px;font-weight:bold\">✨ Begin the Adventure</button>"
    +"</div>";
  el.innerHTML = html;
  el.querySelector(".catbtn2").addEventListener("click", function(){ setState({pg:"cat"}); });
  el.querySelector(".beginbtn").addEventListener("click", function(){
    var n1=document.getElementById("n1").value||"Carson";
    var n2=document.getElementById("n2").value||"Avery";
    var cks=makeChunks(getStory(st.ak,n1,n2));
    Object.assign(st,{pg:"story",n1:n1,n2:n2,cks:cks,idx:0,typed:"",typing:false});
    render();
    setTimeout(function(){ typeChunk(0); },30);
  });
}

function renderStory(el,an){
  var ac = an.accent;
  var pct = ((st.idx+(st.typing?.5:1))/st.cks.length)*100;
  var html = "<div class=\"s\">"
    +"<button class=\"back infobtn\">← Back</button>"
    +"<div style=\"text-align:center;margin-bottom:12px\">"
    +"<div style=\"font-size:30px\">"+an.emoji+"</div>"
    +"<div style=\"background:rgba(255,255,255,.1);border-radius:99px;height:5px;margin:8px 0;overflow:hidden\"><div id=\"progbar\" style=\"height:100%;background:"+ac+";width:"+pct+"%;border-radius:99px;transition:width .3s\"></div></div>"
    +"<div id=\"ctr\" style=\"font-size:10px;color:rgba(255,255,255,.35)\">"+(st.idx+1)+" / "+st.cks.length+"</div>"
    +"<button id=\"vbtn\" style=\"margin-top:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;color:rgba(255,255,255,.7);font-size:13px;cursor:pointer\">"+(voiceOn?"🔇 Stop reading":"🔊 Read aloud")+"</button>"
    +"</div>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"33;min-height:150px;margin-bottom:14px;line-height:1.8\"><span id=\"tt\" style=\"color:rgba(255,255,255,.9);font-size:15px\">"+st.typed+"</span>"+(st.typing?"<span style=\"opacity:.4\">▋</span>":"")+"</div>"
    +"<div id=\"sb\"></div></div>";
  el.innerHTML = html;
  el.querySelector(".infobtn").addEventListener("click", function(){ 
    clearInterval(st.tm); voiceOn=false;
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    setState({pg:"info"});
  });
  document.getElementById("vbtn").addEventListener("click", function(){
    voiceOn=!voiceOn;
    this.textContent = voiceOn ? "🔇 Stop reading" : "🔊 Read aloud";
    if(voiceOn){ speakNow(); } else { if(window.speechSynthesis) window.speechSynthesis.cancel(); }
  });
  renderBtns(ac);
}

function renderBtns(ac){
  var el=document.getElementById("sb"); if(!el) return;
  var done=!st.typing&&st.idx===st.cks.length-1;
  if(st.typing){
    el.innerHTML="<button id=\"skipbtn\" style=\"width:100%;display:block;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77\">Skip ahead →</button>";
    document.getElementById("skipbtn").addEventListener("click",function(){ clearInterval(st.tm); st.typed=st.cks[st.idx]||""; st.typing=false; var t=document.getElementById("tt"); if(t) t.textContent=st.typed; renderBtns(ac); });
  } else if(done){
    el.innerHTML="<div style=\"text-align:center;font-size:20px;margin-bottom:10px\">🌙 Sweet dreams!</div>"
      +"<button id=\"againbtn\" style=\"width:100%;display:block;margin-bottom:8px;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77\">Read Again</button>"
      +"<button id=\"homebtn2\" style=\"width:100%;display:block;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77\">Choose Another Animal</button>";
    document.getElementById("againbtn").addEventListener("click",function(){ typeChunk(0); });
    document.getElementById("homebtn2").addEventListener("click",function(){ clearInterval(st.tm); voiceOn=false; if(window.speechSynthesis) window.speechSynthesis.cancel(); setState({pg:"home",cat:null,ak:null}); });
  } else {
    el.innerHTML="<button id=\"nxtbtn\" style=\"width:100%;display:block;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77\">Continue →</button>";
    document.getElementById("nxtbtn").addEventListener("click",function(){ typeChunk(st.idx+1); });
  }
}

function updateProgress(){
  var an=A[st.ak]; if(!an) return;
  var ac=an.accent;
  var pct=((st.idx+(st.typing?.5:1))/st.cks.length)*100;
  var bar=document.getElementById("progbar");
  var ctr=document.getElementById("ctr");
  if(bar) bar.style.width=pct+"%";
  if(ctr) ctr.textContent=(st.idx+1)+" / "+st.cks.length;
}

function typeChunk(i){
  clearInterval(st.tm);
  st.idx=i; st.typed=""; st.typing=true;
  updateProgress();
  var t=st.cks[i]||""; var j=0;
  var ac=A[st.ak].accent;
  var ttEl=document.getElementById("tt");
  if(!ttEl){ render(); ttEl=document.getElementById("tt"); }
  // Show skip button immediately
  renderBtns(ac);
  st.tm=setInterval(function(){
    j++; st.typed=t.slice(0,j);
    if(ttEl) ttEl.textContent=st.typed;
    if(j>=t.length){
      clearInterval(st.tm); st.tm=null; st.typing=false;
      if(i===st.cks.length-1) markRead(st.ak);
      updateProgress();
      renderBtns(ac);
      if(voiceOn) speakNow();
    }
  },18);
}

function speakNow(){
  if(!voiceOn||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(st.cks[st.idx]||"");
  u.rate=0.85; u.pitch=1.0;
  var vs=window.speechSynthesis.getVoices();
  var v=vs.find(function(x){ return x.name.includes("Samantha")||x.name.includes("Karen")||x.lang==="en-US"; });
  if(v) u.voice=v;
  window.speechSynthesis.speak(u);
}

render();
</script>
